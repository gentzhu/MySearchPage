<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的搜索页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .fixed-header {
            background: white;
            z-index: 100;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .search-container {
            display: flex;
            margin-bottom: 12px;
            align-items: center;
            gap: 5px;
            width: 100%;
            position: relative;
        }
        
        #search-input {
            padding: 10px 35px 10px 10px;
            font-size: 16px;
            flex-grow: 1;
            border: 1px solid #000;
            width: 100%;
        }
        
        .clear-input {
            position: absolute;
            right: 3px;
            cursor: pointer;
            font-size: 42px;
            color: #999;
            padding: 8px;
            margin: -8px;
            line-height: 0.7;
        }
        
        .control-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
            flex-wrap: wrap;
            width: 100%;
        }
        
        button {
            padding: 6px 10px;
            border: 1px solid #000;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
            white-space: normal;
            word-wrap: break-word;
        }
        
        button.small {
            font-size: 12px;
            padding: 4px 6px;
            line-height: 1.2;
        }
        
        button.highlight {
            background-color: #f0f0f0;
            box-shadow: 0 0 0 2px #4a90e2;
        }
        
        button.selected {
            background-color: #e0e0e0;
        }
        
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 5px;
            width: 100%;
        }
        
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px;
        }
        
        .history-container {
            margin-top: 5px;
            width: 100%;
        }
        
        .history-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            position: sticky;
            top: 0;
            background: white;
            padding: 5px 0;
            z-index: 10;
        }
        
        .history-item {
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 8px;
            padding: 4px 8px;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 14px;
        }
        
        .history-item.highlight {
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px #4a90e2;
        }
        
        .history-item.editable {
            border: 1px dashed #000;
            background-color: #fff9f9;
        }
        
        .history-item.selected {
            background-color: #e0e0e0;
        }
        
        #quick-search-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: block;
            z-index: 100;
            touch-action: manipulation;
        }
        
        #current-keys {
            font-weight: bold;
            color: #4a90e2;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        
        .edit-history-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            z-index: 1000;
            max-width: 90%;
            width: 300px;
        }
        
        .edit-history-modal input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .edit-history-modal button {
            padding: 6px 12px;
            margin-right: 5px;
        }

        @media (max-width: 768px) {
            .fixed-header {
                padding: 5px 10px;
            }
            
            #search-input {
                padding: 4px 4px;
                font-size: 16px;
            }
            
            button {
                padding: 2px 1px;
                font-size: 14px;
                margin: 0px;
                width: auto;
            }
            
            button.small {
                font-size: 10px;
                padding: 2px 4px;
            }
            
            button.highlight {
                box-shadow: 0 0 0 1px #4a90e2;
            }
        }
    </style>
</head>
<body>
    <div class="fixed-header">
        <div class="search-container">
            <input type="text" id="search-input" autocomplete="off">
            <span class="clear-input" title="清空输入">×</span>
        </div>

        <div class="control-buttons">
            <button id="save-only">仅保存</button>
            <button id="all-sites">所有</button>
            <button id="common-sites">常用</button>
            <button id="foreign-sites">外网</button>
            <button id="edit-history">编辑历史</button>
            <button id="export-history">导出历史</button>
            <button id="import-history">导入历史</button>
        </div>

        <div class="btn-group">
            <button data-site="xiaohongshu">小红书</button>
            <button data-site="douyin">抖音</button>
            <button data-site="douyin-history" class="small">抖音历史</button>
            <button data-site="douyin-fav" class="small">抖音收藏夹</button>
            <button data-site="zhihu">知乎</button>
            <button data-site="zhihu-history" class="small">知乎历史</button>
            <button data-site="zhihu-fav" class="small">知乎收藏</button>
            <button data-site="bilibili">哔哩哔哩</button>
            <button data-site="bilibili-history" class="small">哔哩哔哩历史</button>
            <button data-site="bilibili-fav" class="small">哔哩哔哩收藏夹</button>
            <button data-site="bing">必应</button>
            <button data-site="baidu">百度</button>
            <button data-site="tieba">百度贴吧</button>
            <button data-site="qq-medical">腾讯医典</button>
            <button data-site="github">GitHub</button>
            <button data-site="google">谷歌</button>
            <button data-site="twitter">推特</button>
            <button data-site="yandex">Yandex</button>
            <button data-site="mubu">幕布精选社区</button>
            <button data-site="anki">Anki卡牌分享社区</button>
            <button data-site="wandoujia">豌豆荚</button>
            <button data-site="greasyfork">Greasy Fork</button>
            <button data-site="coolapk">酷安</button>
            <button data-site="tongyi">通义千问</button>
            <button data-site="kimi">Kimi</button>
            <button data-site="deepseek">DeepSeek</button>
            <button data-site="ximalaya">喜马拉雅搜索</button>
            <button data-site="pinduoduo">拼多多</button>
            <button data-site="jd">京东</button>
            <button data-site="taobao">淘宝</button>
            <button data-site="weixin">微信搜索</button>
            <button data-site="quicker">Quicker</button>
            <button data-site="lingfengyun">凌风云</button>
            <button data-site="wangpanzhijia">网盘之家</button>
        </div>
        
        <div class="history-container">
            <div class="history-title">搜索历史</div>
        </div>
    </div>

    <div class="scrollable-content">
        <div id="history-list"></div>
    </div>

    <div id="quick-search-hint">快速搜索: <span id="current-keys">[无]</span></div>

    <div class="modal" id="error-modal">
        <div class="modal-content">
            <p>请输入搜索关键词！</p>
        </div>
    </div>

    <div class="edit-history-modal" id="edit-history-modal">
        <input type="text" id="history-edit-input">
        <button id="save-edit">保存</button>
        <button id="cancel-edit">取消</button>
    </div>

    <script>
        const siteUrls = {
            xiaohongshu: 'https://www.xiaohongshu.com/search_result?keyword=',
            douyin: 'https://www.douyin.com/search/',
            'douyin-history': 'https://www.douyin.com/user/self?from_tab_name=main&showTab=record',
            'douyin-fav': 'https://www.douyin.com/user/self?from_tab_name=main&showTab=favorite_collection',
            zhihu: 'https://www.bing.com/search?q=site:zhihu.com ',
            'zhihu-history': 'https://www.zhihu.com/search?type=content&q=',
            'zhihu-fav': 'https://www.zhihu.com/collections/mine',
            bilibili: 'https://search.bilibili.com/all?keyword=',
            'bilibili-history': 'https://www.bilibili.com/history',
            'bilibili-fav': 'https://space.bilibili.com/249112844/favlist?fid=51323344&ftype=create',
            bing: 'https://www.bing.com/search?q=',
            baidu: 'https://www.baidu.com/s?wd=',
            tieba: 'https://tieba.baidu.com/f/search/res?ie=utf-8&qw=',
            'qq-medical': 'https://h5.baike.qq.com/mobile/search.html?search=',
            github: 'https://github.com/search?q=',
            google: 'https://www.google.com/search?q=',
            twitter: 'https://twitter.com/search?q=',
            yandex: 'https://yandex.com/search/?text=',
            mubu: 'https://mubu.com/explore/community/search?query=',
            anki: 'https://ankiweb.net/shared/decks/',
            wandoujia: 'https://www.wandoujia.com/',
            greasyfork: 'https://greasyfork.org/zh-CN/scripts?q=',
            coolapk: 'https://www.coolapk.com/search?q=',
            tongyi: 'https://tongyi.aliyun.com/qianwen/',
            kimi: 'https://kimi.moonshot.cn/',
            deepseek: 'https://chat.deepseek.com/',
            ximalaya: 'https://www.ximalaya.com/so/',
            pinduoduo: 'https://yangkeduo.com/search_result.html?search_key=',
            jd: 'https://search.jd.com/Search?keyword=',
            taobao: 'https://s.taobao.com/search?q=',
            weixin: 'https://weixin.sogou.com/weixin?type=2&s_from=input&ie=utf8&query=',
            quicker: 'https://getquicker.net/Search?keyword=',
            lingfengyun: 'https://www.lingfengyun.com/Search/Search?wd=',
            wangpanzhijia: 'https://www.lingfengyun.com/?wd='
        };

        const linkButtons = [
            'douyin-history', 'douyin-fav',
            'zhihu-history', 'zhihu-fav',
            'bilibili-history', 'bilibili-fav',
            'tongyi', 'kimi', 'deepseek'
        ];

        const commonSites = ['xiaohongshu', 'douyin', 'zhihu', 'bilibili', 'bing', 'baidu', 'github', 'mubu', 'anki', 'tongyi', 'kimi', 'deepseek', 'ximalaya'];
        const foreignSites = ['google', 'twitter', 'yandex', 'github', 'greasyfork'];
        const allSites = Object.keys(siteUrls);
        const controlButtons = ['save-only', 'all-sites', 'common-sites', 'foreign-sites', 'edit-history', 'export-history', 'import-history'];

        const searchInput = document.getElementById('search-input');
        const historyList = document.getElementById('history-list');
        const saveOnlyBtn = document.getElementById('save-only');
        const allSitesBtn = document.getElementById('all-sites');
        const commonSitesBtn = document.getElementById('common-sites');
        const foreignSitesBtn = document.getElementById('foreign-sites');
        const editHistoryBtn = document.getElementById('edit-history');
        const exportHistoryBtn = document.getElementById('export-history');
        const importHistoryBtn = document.getElementById('import-history');
        const clearInputBtn = document.querySelector('.clear-input');
        const quickSearchHint = document.getElementById('quick-search-hint');
        const currentKeysDisplay = document.getElementById('current-keys');
        const editHistoryModal = document.getElementById('edit-history-modal');
        const historyEditInput = document.getElementById('history-edit-input');
        const saveEditBtn = document.getElementById('save-edit');
        const cancelEditBtn = document.getElementById('cancel-edit');
        const errorModal = document.getElementById('error-modal');
        let historyItems = [];
        let currentFocusElement = null;
        let selectedElements = [];
        let lastDeletedItems = [];
        let quickSearchActive = false;
        let isEditMode = false;
        let isEditingHistory = false;
        let currentEditItem = null;
        let quickSearchKeys = '';
        let matchedItems = [];
        let currentMatchIndex = -1;

        let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
        renderHistory();
        initEventListeners();

        function initEventListeners() {
            document.addEventListener('keydown', handleGlobalKeyDown);
            
            searchInput.addEventListener('input', handleInput);
            searchInput.addEventListener('keydown', handleInputKeyDown);
            searchInput.addEventListener('focus', () => {
                currentFocusElement = searchInput;
                quickSearchActive = false;
            });
            
            clearInputBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchInput.focus();
            });

            saveOnlyBtn.addEventListener('click', () => {
                const keyword = searchInput.value.trim();
                if (keyword) {
                    addToHistory(keyword);
                    searchInput.value = '';
                }
            });

            editHistoryBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                isEditMode = !isEditMode;
                editHistoryBtn.textContent = isEditMode ? '退出编辑' : '编辑历史';
                renderHistory();
            });

            exportHistoryBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                exportHistory();
            });

            importHistoryBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                importHistory();
            });

            allSitesBtn.addEventListener('click', () => batchSearch(allSites));
            commonSitesBtn.addEventListener('click', () => batchSearch(commonSites));
            foreignSitesBtn.addEventListener('click', () => batchSearch(foreignSites));

            document.querySelectorAll('.btn-group button, .control-buttons button').forEach(button => {
                if (controlButtons.includes(button.id)) return;
                
                button.addEventListener('click', (e) => {
                    const site = button.getAttribute('data-site');
                    if (e.button === 0) {
                        if (selectedElements.length > 0 && selectedElements.includes(button)) {
                            toggleSelectElement(button);
                        } else {
                            search(site, true);
                        }
                    }
                });
                
                button.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    toggleSelectElement(button);
                });
                
                button.addEventListener('focus', () => {
                    if (!quickSearchActive) {
                        currentFocusElement = button;
                        quickSearchKeys = '';
                        updateQuickSearchDisplay();
                        clearMatches();
                    }
                });
            });

            saveEditBtn.addEventListener('click', () => {
                if (currentEditItem && historyEditInput.value.trim()) {
                    const oldKeyword = currentEditItem.getAttribute('data-keyword');
                    const newKeyword = historyEditInput.value.trim();
                    if (oldKeyword !== newKeyword) {
                        removeFromHistory(oldKeyword);
                        addToHistory(newKeyword);
                    }
                    editHistoryModal.style.display = 'none';
                    isEditingHistory = false;
                    currentEditItem = null;
                }
            });

            cancelEditBtn.addEventListener('click', () => {
                editHistoryModal.style.display = 'none';
                isEditingHistory = false;
                currentEditItem = null;
            });

            document.addEventListener('click', (e) => {
                if (isEditMode && !e.target.closest('.history-item') && e.target !== editHistoryBtn) {
                    isEditMode = false;
                    editHistoryBtn.textContent = '编辑历史';
                    renderHistory();
                }
                
                if (isEditingHistory && !e.target.closest('#edit-history-modal') && e.target !== editHistoryBtn) {
                    editHistoryModal.style.display = 'none';
                    isEditingHistory = false;
                    currentEditItem = null;
                }
                
                if (!e.target.closest('button, input, .history-item') && currentFocusElement) {
                    currentFocusElement.focus();
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if (isEditingHistory) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        saveEditBtn.click();
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        cancelEditBtn.click();
                    }
                    e.stopImmediatePropagation();
                    return false;
                }

                if (e.key === 'F7') {
                    e.preventDefault();
                    searchInput.focus();
                    return;
                }

                const controlButtons = ['save-only', 'all-sites', 'common-sites', 'foreign-sites', 
                                      'edit-history', 'export-history', 'import-history'];
                if (e.key === 'Enter' && currentFocusElement && controlButtons.includes(currentFocusElement.id)) {
                    e.preventDefault();
                    currentFocusElement.click();
                    return;
                }

                if (e.key === 'Enter' && selectedElements.length > 0) {
                    e.preventDefault();
                    const sites = selectedElements.map(el => el.getAttribute('data-site')).filter(site => site);
                    if (sites.length > 0) {
                        batchSearch(sites);
                    }
                    return;
                }

                if (e.key === 'Escape') {
                    e.preventDefault();
                    if (document.activeElement === searchInput) {
                        searchInput.blur();
                        const firstButton = document.querySelector('.btn-group button, .control-buttons button');
                        if (firstButton) {
                            firstButton.focus();
                            currentFocusElement = firstButton;
                        }
                    } else if (selectedElements.length > 0) {
                        clearSelection();
                    } else if (quickSearchKeys) {
                        quickSearchKeys = '';
                        updateQuickSearchDisplay();
                        clearMatches();
                        quickSearchActive = false;
                    }
                    return;
                }

                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    if (document.activeElement === searchInput && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
                        return;
                    }
                    
                    e.preventDefault();
                    navigateWithArrowKeys(e.key);
                    return;
                }

                if (e.key === ' ' && currentFocusElement && currentFocusElement !== searchInput) {
                    e.preventDefault();
                    toggleSelectElement(currentFocusElement);
                    return;
                }

                if (e.key === 'Enter' && currentFocusElement) {
                    e.preventDefault();
                    if (currentFocusElement === searchInput) {
                        const defaultSites = ['bing', 'baidu', 'google'];
                        batchSearch(defaultSites);
                    } else if (currentFocusElement.classList.contains('history-item')) {
                        const keyword = currentFocusElement.getAttribute('data-keyword');
                        searchInput.value = keyword;
                        searchInput.focus();
                    } else if (currentFocusElement.hasAttribute('data-site')) {
                        const site = currentFocusElement.getAttribute('data-site');
                        search(site, true);
                    }
                    return;
                }

                if (e.key === 'F2' && currentFocusElement && currentFocusElement.classList.contains('history-item')) {
                    e.preventDefault();
                    const keyword = currentFocusElement.getAttribute('data-keyword');
                    editHistoryItem(keyword);
                    return;
                }

                if ((e.key === 'Delete' || e.key === 'F4') && selectedElements.length > 0) {
                    e.preventDefault();
                    deleteSelectedHistoryItems();
                    return;
                }

                if (e.key === 'z' && e.ctrlKey && lastDeletedItems.length > 0) {
                    e.preventDefault();
                    undoDelete();
                    return;
                }
            });

            quickSearchHint.addEventListener('touchstart', (e) => {
                e.preventDefault();
                searchInput.focus();
                if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    setTimeout(() => {
                        searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                }
            });
        }

        // 其他功能函数保持不变（clearSelection, showErrorModal, handleInputKeyDown等）
        // ...
        
        function batchSearch(sites) {
            const keyword = searchInput.value.trim();
            if (!keyword) {
                showErrorModal();
                return;
            }
            
            const processedSites = new Set();
            sites.forEach(site => {
                if (processedSites.has(site)) return;
                processedSites.add(site);
                
                if (linkButtons.includes(site)) {
                    const url = siteUrls[site];
                    window.open(url, '_blank');
                } else {
                    const url = siteUrls[site] + encodeURIComponent(keyword);
                    window.open(url, '_blank');
                }
            });
            addToHistory(keyword);
        }

        function editHistoryItem(keyword, clickPosition) {
            isEditingHistory = true;
            currentEditItem = document.querySelector(`.history-item[data-keyword="${keyword}"]`);
            if (currentEditItem) {
                historyEditInput.value = keyword;
                editHistoryModal.style.display = 'block';
                historyEditInput.focus();
                
                setTimeout(() => {
                    const inputWidth = historyEditInput.offsetWidth;
                    const textWidth = historyEditInput.scrollWidth;
                    const charWidth = textWidth / historyEditInput.value.length;
                    const cursorPos = Math.min(
                        Math.floor(clickPosition / charWidth),
                        historyEditInput.value.length
                    );
                    historyEditInput.setSelectionRange(cursorPos, cursorPos);
                }, 50);
            }
        }
    </script>
</body>
</html>
