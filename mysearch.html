    <script>
        // 网站搜索URL模板
        let siteUrls = {
            xiaohongshu: 'https://www.xiaohongshu.com/search_result?keyword=',
            douyin: 'https://www.douyin.com/search/',
            'douyin-history': 'https://www.douyin.com/user/self?from_tab_name=main&showTab=record',
            'douyin-fav': 'https://www.douyin.com/user/self?from_tab_name=main&showTab=favorite_collection',
            zhihu: 'https://www.bing.com/search?q=site:zhihu.com ',
            'zhihu-history': 'https://www.zhihu.com/search?type=content&q=',
            'zhihu-fav': 'https://www.zhihu.com/collections/mine',
            bilibili: 'https://search.bilibili.com/all?keyword=',
            'bilibili-history': 'https://www.bilibili.com/history',
            'bilibili-fav': 'https://space.bilibili.com/249112844/favlist?fid=51323344&ftype=create',
            bing: 'https://www.bing.com/search?q=',
            baidu: 'https://www.baidu.com/s?wd=',
            tieba: 'https://tieba.baidu.com/f/search/res?ie=utf-8&qw=',
            'qq-medical': 'https://h5.baike.qq.com/mobile/search.html?search=',
            github: 'https://github.com/search?q=',
            google: 'https://www.google.com/search?q=',
            twitter: 'https://twitter.com/search?q=',
            yandex: 'https://yandex.com/search/?text=',
            mubu: 'https://mubu.com/explore/community/search?query=',
            anki: 'https://ankiweb.net/shared/decks/',
            wandoujia: 'https://www.wandoujia.com/',
            greasyfork: 'https://greasyfork.org/zh-CN/scripts?q=',
            coolapk: 'https://www.coolapk.com/search?q=',
            tongyi: 'https://tongyi.aliyun.com/qianwen/',
            kimi: 'https://kimi.moonshot.cn/',
            deepseek: 'https://chat.deepseek.com/',
            ximalaya: 'https://www.ximalaya.com/so/',
            jd: 'https://search.jd.com/Search?keyword=',
            taobao: 'https://s.taobao.com/search?q=',
            weixin: 'https://weixin.sogou.com/weixin?type=2&s_from=input&ie=utf8&query=',
            quicker: 'https://getquicker.net/Search?keyword=',
            lingfengyun: 'https://www.lingfengyun.com/Search/Search?wd=',
            wangpanzhijia: 'https://www.lingfengyun.com/?wd='
        };

        // 链接按钮列表（直接打开，不需要关键词）
        const linkButtons = [
            'douyin-history', 'douyin-fav',
            'zhihu-history', 'zhihu-fav',
            'bilibili-history', 'bilibili-fav',
            'tongyi', 'kimi', 'deepseek'
        ];

        // 常用网站列表
        const commonSites = ['xiaohongshu', 'douyin', 'zhihu', 'bilibili', 'bing', 'baidu', 'github', 'mubu', 'anki', 'tongyi', 'kimi', 'deepseek', 'ximalaya'];

        // 外网网站列表
        const foreignSites = ['google', 'twitter', 'yandex', 'github', 'greasyfork'];

        // 所有网站列表
        const allSites = Object.keys(siteUrls);

        // 获取DOM元素
        const searchInput = document.getElementById('search-input');
        const historyList = document.getElementById('history-list');
        const saveOnlyBtn = document.getElementById('save-only');
        const allSitesBtn = document.getElementById('all-sites');
        const commonSitesBtn = document.getElementById('common-sites');
        const foreignSitesBtn = document.getElementById('foreign-sites');
        const editHistoryBtn = document.getElementById('edit-history');
        const exportHistoryBtn = document.getElementById('export-history');
        const importHistoryBtn = document.getElementById('import-history');
        const clearInputBtn = document.querySelector('.clear-input');
        const editHistoryModal = document.getElementById('edit-history-modal');
        const historyEditInput = document.getElementById('history-edit-input');
        const saveEditBtn = document.getElementById('save-edit');
        const cancelEditBtn = document.getElementById('cancel-edit');
        const errorModal = document.getElementById('error-modal');
        const mobileQuickSearch = document.getElementById('mobile-quick-search');
        const mobileEscBtn = document.getElementById('mobile-esc-btn');
        let historyItems = []; // 恢复显示
        const historymatches = []; // 匹配项列表
        // 导航相关变量
        let currentFocusElement = null;
        let selectedElements = [];
        let lastDeletedItems = [];
        let quickSearchActive = false;

        // 动态添加设置按钮
        const settingsBtn = document.createElement('button');
        settingsBtn.id = 'settings';
        settingsBtn.textContent = '设置';
        document.querySelector('.control-buttons').appendChild(settingsBtn);

        // 编辑状态标志
        let isEditMode = false;
        let isEditingHistory = false;
        let currentEditItem = null;
        let isInputMethodActive = false;

        // 快速搜索相关变量
        let quickSearchKeys = '';
        let matchedItems = [];
        let currentMatchIndex = -1;

        // 排序状态对象
        const sortStates = {
            name: { ascending: true },
            time: { ascending: false }, // 时间默认倒序（新->旧）
            length: { ascending: true } // 长度默认升序
        };

        // 排序功能（支持双向）
        function sortByName() {
            const state = sortStates.name;
            state.ascending = !state.ascending; // 切换方向
            
            searchHistory.sort((a, b) =>
                state.ascending ? a.keyword.localeCompare(b.keyword) : b.keyword.localeCompare(a.keyword)
            );
            
            // 更新按钮文本
            document.getElementById('sort-by-name').textContent =
                `名称 ${state.ascending ? '↑' : '↓'}`;
                
            renderHistory();
        }
        
        function sortByTime() {
            const state = sortStates.time;
            state.ascending = !state.ascending; // 切换方向

            // 根据时间戳排序
            searchHistory.sort((a, b) => {
                const timeA = new Date(a.timestamp).getTime();
                const timeB = new Date(b.timestamp).getTime();
                return state.ascending ? timeA - timeB : timeB - timeA;
            });

            // 更新按钮文本
            document.getElementById('sort-by-time').textContent =
                `时间 ${state.ascending ? '↑' : '↓'}`;
                
            renderHistory();
        }
        
        function sortByLength() {
            const state = sortStates.length;
            state.ascending = !state.ascending; // 切换方向
            
            searchHistory.sort((a, b) =>
                state.ascending ? a.keyword.length - b.keyword.length : b.keyword.length - a.keyword.length
            );
            
            // 更新按钮文本
            document.getElementById('sort-by-length').textContent =
                `长度 ${state.ascending ? '↑' : '↓'}`;
                
            renderHistory();
        }
        
        // 加载搜索历史
        let searchHistory = [];
        const storedHistory = localStorage.getItem('searchHistory');
        if (storedHistory) {
            // 尝试解析为数组
            const parsed = JSON.parse(storedHistory);
            if (Array.isArray(parsed)) {
                // 检查第一个元素是字符串还是对象
                if (parsed.length > 0 && typeof parsed[0] === 'string') {
                    // 旧格式：字符串数组，转换为对象数组，时间戳设为当前时间
                    searchHistory = parsed.map(keyword => ({ keyword, timestamp: new Date().toISOString() }));
                } else {
                    // 新格式：对象数组
                    searchHistory = parsed;
                }
            }
        }
        renderHistory();
        
        // 排序按钮事件
        document.getElementById('sort-by-name').addEventListener('click', sortByName);
        document.getElementById('sort-by-time').addEventListener('click', sortByTime);
        document.getElementById('sort-by-length').addEventListener('click', sortByLength);

        // 全局键盘事件（用于快速搜索）
        document.addEventListener('keydown', handleGlobalKeyDown);

        // 输入框事件
        searchInput.addEventListener('input', handleInput);

        searchInput.addEventListener('focus', () => {
            currentFocusElement = searchInput;
            quickSearchActive = false;
        });

        // 清空输入框按钮
        // 修改清空按钮事件监听器
        clearInputBtn.addEventListener('click', () => {
            // 清空主搜索框
            searchInput.value = '';
            searchInput.focus();

        });
        saveOnlyBtn.addEventListener('click', () => {
            const keyword = searchInput.value.trim();
            if (keyword) {
                addToHistory(keyword);
                searchInput.value = '';
            }
        });
        editHistoryBtn.addEventListener('click', (e) => {
            e.preventDefault(); // 新增
            e.stopPropagation();
            isEditMode = !isEditMode;
            editHistoryBtn.textContent = isEditMode ? '退出编辑' : '编辑历史';
            renderHistory();
        });
        exportHistoryBtn.addEventListener('click', (e) => {
            e.preventDefault(); // 新增
            e.stopPropagation(); // 新增
            exportHistory();
        });
        importHistoryBtn.addEventListener('click', (e) => {
            e.preventDefault(); // 新增
            e.stopPropagation(); // 新增
            importHistory();
        });

        // 批量搜索按钮
        allSitesBtn.addEventListener('click', () => batchSearch(allSites));
        commonSitesBtn.addEventListener('click', () => batchSearch(commonSites));
        foreignSitesBtn.addEventListener('click', () => batchSearch(foreignSites));
        // 为所有搜索按钮添加事件监听
        document.querySelectorAll('.btn-group button[data-site], .control-buttons button[data-site]').forEach(button => {
            button.addEventListener('click', (e) => {
                const site = button.getAttribute('data-site');
                if (e.button === 0) { // 左键点击
                    // 如果当前已经有选中的元素，则左键点击任何按钮都只做多选操作（切换选中状态）
                    if (selectedElements.length > 0) {
                        toggleSelectElement(button);
                    } else {
                        // 没有多选时，直接执行搜索
                        clearSelection(); 
                        search(site, true);
                    }
                }
            });

            // 右键点击多选
            button.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                toggleSelectElement(button);
            });

            button.addEventListener('focus', () => {
                if (!quickSearchActive) {
                    currentFocusElement = button;
                    quickSearchKeys = '';
                    updateQuickSearchDisplay();

        // 点击空白处退出编辑模式或关闭模态框
        function focusQuickSearch(e) {

        // 清除所有匹配高亮
        function clearMatches() {

                item.element.classList.remove('highlight');
            });
            matchedItems = [];
            currentMatchIndex = -1;
        }

        // 全局键盘事件处理（快速搜索）
        function handleGlobalKeyDown(e) {
            if (e.key === 'Escape') {
                GlobalQuit(e);
            }
            
            // 处理Ctrl+F3, Ctrl+F5, Ctrl+F6快捷键
            if (e.ctrlKey) {
                if (e.key === 'F3') {
                    e.preventDefault();
                    sortByName();
                    return;
                } else if (e.key === 'F5') {
                    e.preventDefault();
                    sortByTime();
                    return;
                } else if (e.key === 'F6') {
                    e.preventDefault();
                    sortByLength();
                    return;
                }
            }
            // 电脑端快速搜索触发（包括空格）
            if (window.screen.width > 768 && !document.activeElement.matches('input, textarea') &&
                e.key.length === 1 && /[a-z0-9\s]/i.test(e.key)) {
                
                // 空格键需要特殊处理
                // if (e.key === ' ') {
                //     // e.preventDefault();
                //     mobileQuickSearch.focus();
                //     mobileQuickSearch.value += ' ';
                //     mobileQuickSearch.dispatchEvent(new Event('input'));
                //     return;
                // }
                
                // 其他字符正常处理
                mobileQuickSearch.focus();
                focusQuickSearch(e);
                return;
            }
            // 电脑端快速搜索激活
            if (quickSearchActive && e.key === 'Backspace') {
                e.preventDefault();
                if (quickSearchKeys.length > 0) {
                    quickSearchKeys = quickSearchKeys.slice(0, -1);
                    updateQuickSearchDisplay();
                    if (quickSearchKeys) {
                        performQuickSearch();
                    } else {
                        clearMatches();
                        showAllHistoryItems();
                        quickSearchActive = false;
                    }
                }
                return;
            }

            // Tab键切换下一个匹配项
            if (e.key === 'Tab' && quickSearchActive && matchedItems.length > 0) {
                e.preventDefault();
                cycleMatches(1); // 下一个匹配项
                return;
            }

            // Ctrl+Tab切换上一个匹配项
            if (e.key === 'Tab' && e.ctrlKey && quickSearchActive && matchedItems.length > 0) {
                e.preventDefault();
                cycleMatches(-1); // 上一个匹配项
                return;
            }

            // 普通Tab键切换焦点
            if (e.key === 'Tab' && !quickSearchActive) {
                e.preventDefault();
                const allElements = Array.from(document.querySelectorAll('button, .history-item, input'));
                const currentIndex = allElements.indexOf(currentFocusElement);
                const nextIndex = (currentIndex + 1) % allElements.length;
                currentFocusElement = allElements[nextIndex];
                currentFocusElement.focus();
                return;
            }

            // Ctrl+Tab返回上一个焦点
            if (e.key === 'Tab' && e.ctrlKey && !quickSearchActive) {
                e.preventDefault();
                const allElements = Array.from(document.querySelectorAll('button, .history-item, input'));
                const currentIndex = allElements.indexOf(currentFocusElement);
                const prevIndex = (currentIndex - 1 + allElements.length) % allElements.length;
                currentFocusElement = allElements[prevIndex];
                currentFocusElement.focus();
                return;
            }

            // Tab键切换下一个匹配项
            if (e.key === 'Tab' && quickSearchActive && matchedItems.length > 0) {
                e.preventDefault();
                cycleMatches(1); // 下一个匹配项
                return;
            }

            // Ctrl+Tab切换上一个匹配项
            if (e.key === 'Tab' && e.ctrlKey && quickSearchActive && matchedItems.length > 0) {
                e.preventDefault();
                cycleMatches(-1); // 上一个匹配项
                return;
            }

            // 处理Ctrl+-取消所有选中
            if (e.key === '-' && e.ctrlKey) {
                e.preventDefault();
                e.stopPropagation();
                clearSelection();
                return;
            }

            if (isEditingHistory) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    saveEditBtn.click();
                    return;
                }

                return;
            }

            // F7聚焦输入框
            if (e.key === 'F7') {
                e.preventDefault();
                searchInput.focus();
                return;
            }

            // 处理控制按钮的Enter键
            const controlButtons = ['save-only', 'all-sites', 'common-sites', 'foreign-sites',
                'edit-history', 'export-history', 'import-history'];
            if (e.key === 'Enter' && currentFocusElement && controlButtons.includes(currentFocusElement.id)) {
                e.preventDefault();
                currentFocusElement.click();
                return;
            }

            // 处理多选后的Enter键（优先处理多选）
            if (e.key === 'Enter' && selectedElements.length > 0) {
                e.preventDefault();
                // 直接传递选中的元素数组给batchSearch
                batchSearch(selectedElements);
                return;
            }

            // 方向键导航
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                // 如果焦点在输入框且是左右方向键，不阻止默认行为
                if (document.activeElement === searchInput && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
                    return;
                }

                e.preventDefault();

                // 快速搜索激活时，使用方向键在匹配项间导航
                if (quickSearchActive && matchedItems.length > 0) {
                    // 如果是第一次按方向键，从第一个匹配项开始
                    if (currentMatchIndex === -1) {
                        currentMatchIndex = 0;
                        highlightCurrentMatch();
                    } else {
                        if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                            cycleMatches(1); // 下一个
                        } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                            cycleMatches(-1); // 上一个
                        }
                    }
                } else {
                    navigateWithArrowKeys(e.key);
                }
                return;
            }

            // 空格选择当前元素
            if (e.key === ' ') {
                // 如果焦点在输入框，不处理空格选择
                if (document.activeElement === searchInput) {
                    return;
                }
                
                // e.preventDefault();
                
                // 快速搜索激活时，操作当前匹配项
                if (document.activeElement === mobileQuickSearch ) {
                    // const currentItem = matchedItems[currentMatchIndex].element;
                    // toggleSelectElement(currentItem);
                    return;
                }
                // 非快速搜索模式，操作当前焦点元素（仅按钮）
                else if (currentFocusElement && currentFocusElement.tagName === 'BUTTON') {
                    toggleSelectElement(currentFocusElement);
                }
                return;
            }

            // Enter键执行操作
            if (e.key === 'Enter') {
                e.preventDefault();
                
                // 1. 处理快速搜索虚拟光标（最高优先级）
                if (quickSearchActive && matchedItems.length > 0) {
                    const currentItem = matchedItems[currentMatchIndex];
                    if (currentItem.type === 'button') {
                        if (searchInput.value.trim()) {
                            clearSelection(); // 清除所有选择
                            const site = currentItem.element.getAttribute('data-site');
                            search(site, true); // 使用单个搜索函数
                        }
                    } else if (currentItem.type === 'history') {
                        searchInput.value = currentItem.element.textContent;
                        searchInput.focus();
                    }
                    return;
                }
                
                // 2. 处理多选网站的情况
                const selectedSites = selectedElements.filter(el => el.hasAttribute('data-site'));
                if (selectedSites.length > 0) {
                    batchSearch(selectedSites);
                    return;
                }
                
                // 3. 处理当前焦点在网站按钮上
                if (currentFocusElement && currentFocusElement.hasAttribute('data-site') && searchInput.value.trim()) {
                    clearSelection(); // 清除所有选择
                    const site = currentFocusElement.getAttribute('data-site');
                    search(site, true); // 使用单个搜索函数
                    return;
                }
                
                // 4. 处理历史项
                if (currentFocusElement && currentFocusElement.classList.contains('history-item')) {
                    const keyword = currentFocusElement.getAttribute('data-keyword');
                    searchInput.value = keyword;
                    searchInput.focus();
                    return;
                }
            }

            // F2编辑历史记录
            if (e.key === 'F2' && currentFocusElement && currentFocusElement.classList.contains('history-item')) {
                e.preventDefault();
                const keyword = currentFocusElement.getAttribute('data-keyword');
                editHistoryItem(keyword);
                return;
            }

            // Delete或F4删除选中的历史记录
            if (e.key === 'Delete' && selectedElements.length > 0) {
                e.preventDefault();
                deleteSelectedHistoryItems();
                return;
            }

            if ((e.key === 'F8' || (e.ctrlKey && e.key === 'Delete'))) {
                e.preventDefault();
                searchInput.value = '';
                searchInput.focus();

            // Ctrl+Z撤销删除
            if (e.key === 'z' && e.ctrlKey && lastDeletedItems.length > 0) {
                e.preventDefault();

                return;
            }
        }

        function GlobalQuit(e) {
            // e.preventDefault();
            if (isEditMode) {
                e.preventDefault();
                cancelEditBtn.click();
                return;
            }
            else if (document.activeElement === searchInput) {
                // e.preventDefault();
                searchInput.blur();

            // ESC只取消快速搜索，不影响选中状态
            else if (mobileQuickSearch.value) {

                // updateQuickSearchDisplay();
                // quickSearchActive = false;
                mobileQuickSearch.blur();

            }
            // 第一次按ESC：清空快速搜索状态
            else if (!mobileQuickSearch.value && matchedItems.length < document.querySelectorAll('.history-item').length) {
                clearMatches();
                showAllHistoryItems();
                // 显示所有元素
                quickSearchActive = false;
                return;
            }
            return;
        }

        // 修改 updateQuickSearchDisplay 函数
        function updateQuickSearchDisplay() {
            // 添加防重复更新检查
            if (mobileQuickSearch.value === quickSearchKeys) return;
            mobileQuickSearch.value = quickSearchKeys || '';
        }
        // 执行快速搜索
        // 修改 performQuickSearch 函数
        function performQuickSearch() {
            // 将输入按空格分割为多个查询词（忽略空字符串）
            const queries = quickSearchKeys.trim().toLowerCase().split(/\s+/).filter(q => q.length > 0);
            clearMatches();
            if (queries.length === 0) {
                showAllHistoryItems();
                return;
            }
            // 获取所有可搜索元素
            const allElements = document.querySelectorAll('.history-item, button[data-site], .control-buttons button');
            
            // 先显示所有历史项
            showAllHistoryItems();
            
            // 所有元素去高亮
            allElements.forEach(el => {
                el.classList.remove('highlight');
            });

            allElements.forEach(element => {
                const text = element.textContent.toLowerCase();
                // 获取每个字符的可能首字母数组（数组的数组）
                const pinyinArray = getPinyinInitials(text);   // 返回示例：[['x'], ['h','g'], ['s']]

                // 生成所有组合
                function generateCombinations(arrays) {
                    if (arrays.length === 0) return [''];
                    const [first, ...rest] = arrays;
                    const restCombinations = generateCombinations(rest);
                    const results = [];
                    for (let i = 0; i < first.length; i++) {
                        for (let j = 0; j < restCombinations.length; j++) {
                            results.push(first[i] + restCombinations[j]);
                        }
                    }
                    return results;
                }

                const combinations = generateCombinations(pinyinArray).map(combo => combo.toLowerCase());
                let allQueriesMatched = true;

                // 对每个查询词独立检查：在文本或拼音组合中连续出现
                for (const query of queries) {
                    let queryMatched = false;
                    
                    // 检查在文本中是否连续出现
                    if (text.indexOf(query) !== -1) {
                        queryMatched = true;
                    } else {
                        // 检查在拼音组合中是否连续出现
                        for (const combo of combinations) {
                            if (combo.indexOf(query) !== -1) {
                                queryMatched = true;
                                break;
                            }
                        }
                    }
                    
                    if (!queryMatched) {
                        allQueriesMatched = false;
                        break;
                    }
                }

                if (allQueriesMatched) {
                    matchedItems.push({
                        element: element,
                        type: element.classList.contains('history-item') ? 'history' : 'button'
                    });
                    element.classList.add('highlight');
                } else {
                    // 只隐藏不匹配的历史项，按钮保持显示
                    if (element.classList.contains('history-item')) {
                        element.style.display = 'none';
                    }
                }
            });

            if (matchedItems.length > 0) {
                currentMatchIndex = 0;
                highlightCurrentMatch();
                // 更新当前焦点元素为第一个匹配项
                currentFocusElement = matchedItems[0].element;
            }
        }
        
        function showAllHistoryItems() {
            document.querySelectorAll('.history-item').forEach(item => {
                item.style.display = 'inline-block';
            });
        }
        // 使用拼音库获取拼音首字母
        function getPinyinInitials(text) {
            console.log('[DEBUG] getPinyinInitials called with text:', text);
            if (!text) return [];
            let result = [];
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const unicode = char.charCodeAt(0);
                console.log(`[DEBUG] Processing char: ${char}, unicode: ${unicode}`);
                let charSet = [];
                // 处理中文字符（Unicode范围：19968-40869）
                if (unicode >= 19968 && unicode <= 40869) {
                    console.log(`[DEBUG] Chinese char detected: ${char} (${unicode})`);
                    
                    // 先检查多音字
                    if (pinyin_dict_firstletter.polyphone[unicode]) {
                        const poly = pinyin_dict_firstletter.polyphone[unicode];
                        console.log(`[DEBUG] Found polyphone mapping: ${poly}`);
                        // 将多音字字符串拆分成单个字母，例如 'hg' -> ['h','g']
                        charSet = poly.split('');
                    }
                    // 再检查常规字典
                    else {
                        const idx = unicode - 19968;
                        console.log(`[DEBUG] Checking all dict at index: ${idx}`);
                        if (idx < pinyin_dict_firstletter.all.length) {
                            const dictChar = pinyin_dict_firstletter.all.charAt(idx);
                            console.log(`[DEBUG] Found dict char: ${dictChar}`);
                            charSet = [dictChar];
                        } else {
                            console.log(`[DEBUG] Index ${idx} out of range (max: ${pinyin_dict_firstletter.all.length})`);
                            charSet = [''];
                        }
                    }
                }
                // 处理非中文字符：数字和字母都直接返回字符本身
                else {
                    console.log(`[DEBUG] Non-Chinese char: ${char}`);
                    charSet = [char.toLowerCase()];
                }
                result.push(charSet);
            }
            console.log('[DEBUG] Final result array:', result);
            return result;
        }

        // 快速搜索匹配算法
        function matchesQuery(text, query) {
            let j = 0;
            if (!query) return true;
            for (let i = 0; i < text.length && j < query.length; i++) {
                if (text[i] === query[j]) {
                    j++;
                }
            }
            return j === query.length;
        }

        // 循环切换匹配项
        function cycleMatches(direction) {
            if (matchedItems.length === 0) return;

            // 移除当前高亮
            if (currentMatchIndex >= 0) {
                matchedItems[currentMatchIndex].element.classList.remove('cursor-highlight');
            }

            // 计算新位置
            currentMatchIndex = (currentMatchIndex + direction + matchedItems.length) % matchedItems.length;

            // 设置新位置并高亮
            highlightCurrentMatch();
            
            // 更新当前焦点元素
            currentFocusElement = matchedItems[currentMatchIndex].element;
        }

        // 高亮当前匹配项
        function highlightCurrentMatch() {
            // 移除之前的光标高亮
            document.querySelectorAll('.cursor-highlight').forEach(el => {
                el.classList.remove('cursor-highlight');
            });
            
            if (currentMatchIndex >= 0 && currentMatchIndex < matchedItems.length) {
                const currentItem = matchedItems[currentMatchIndex];
                currentItem.element.classList.add('cursor-highlight');
                currentItem.element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // 激活当前匹配项
        function activateCurrentMatch() {
            if (currentMatchIndex >= 0 && currentMatchIndex < matchedItems.length) {
                const currentItem = matchedItems[currentMatchIndex];

                if (currentItem.type === 'button') {
                    if (currentItem.element.hasAttribute('data-site')) {
                        const site = currentItem.element.getAttribute('data-site');
                        const keyword = searchInput.value.trim() || currentItem.element.textContent;
                        const url = siteUrls[site] + encodeURIComponent(keyword);
                        window.open(url, '_blank');
                    } else {
                        currentItem.element.click();
                    }
                } else if (currentItem.type === 'history') {
                    searchInput.value = currentItem.element.textContent;
                    searchInput.focus();
                }

                quickSearchKeys = '';
                updateQuickSearchDisplay();
                clearMatches();
                quickSearchActive = false;
            }
        }

        // adjustScrollableArea();
        function adjustScrollableArea() {
            const fixedHeader = document.querySelector('.fixed-header');
            const scrollableContent = document.querySelector('.scrollable-content');
            const fixedHeight = fixedHeader.offsetHeight;

            // 保持冻结线位置计算不变
            scrollableContent.style.marginTop = fixedHeight + 'px';

            // 高度计算需考虑padding（通过box-sizing已处理）
            scrollableContent.style.height = `calc(100vh - ${fixedHeight}px)`;
        }

        // 渲染搜索历史
        function renderHistory() {
            historyList.innerHTML = '';
            historyItems = [];

            searchHistory.forEach(keyword => {
                const item = document.createElement('div');
                item.className = 'history-item';
                if (isEditMode) {
                    item.classList.add('editable');
                }
                item.textContent = keyword.keyword;
                item.setAttribute('data-keyword', keyword.keyword);
                item.tabIndex = 0;
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (isEditMode) {
                        // 编辑模式下点击直接删除
                        removeFromHistory(keyword);
                    } else {
                        if (e.button === 0) {
                            searchInput.value = keyword;
                            searchInput.focus();
                        } else if (e.button === 2) {
                            toggleSelectElement(item);
                        }
                    }
                });

                item.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    const rect = e.target.getBoundingClientRect();
                    const clickPosition = e.clientX - rect.left; // 计算点击位置
                    editHistoryItem(keyword, clickPosition); // 传递位置参数
                });

                item.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    toggleSelectElement(item);
                });

                item.addEventListener('focus', () => {
                    if (!quickSearchActive) {
                        currentFocusElement = item;
                    }
                });

                historyList.appendChild(item);
                historyItems.push(item);
            });
        }

        // 从历史记录中移除
        function removeFromHistory(keyword) {
            searchHistory = searchHistory.filter(item => item.keyword !== keyword);
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            renderHistory();
        }

        // 添加到搜索历史
        function addToHistory(keyword) {
            // 避免重复添加（根据关键词判断），如果存在则先移除
            const existingIndex = searchHistory.findIndex(item => item.keyword === keyword);
            if (existingIndex !== -1) {
                searchHistory.splice(existingIndex, 1);
            }
            // 添加到最前面
            searchHistory.unshift({ keyword, timestamp: new Date().toISOString() });
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            renderHistory();
        }

        // 搜索功能
        function search(site, immediate = false) {
            const keyword = searchInput.value.trim();
            
            // 确保使用正确的site规则
            if (!siteUrls[site]) {
                console.error(`未知的网站: ${site}`);
                return;
            }
            
            if (linkButtons.includes(site)) {
                if (keyword) {
                    navigator.clipboard.writeText(keyword).catch(err => {
                        console.error('无法复制到剪贴板:', err);
                    });
                    addToHistory(keyword);
                }
                const url = siteUrls[site];
                window.open(url, '_blank');
                return;
            }

            if (keyword) {
                addToHistory(keyword);
                const url = siteUrls[site] + encodeURIComponent(keyword);
                window.open(url, '_blank');
            } else {
                // 没有关键词时打开默认页面
                const url = siteUrls[site].replace(/\?.*$/, ''); // 移除查询参数
                window.open(url, '_blank');
            }
        }

        // 批量搜索函数 - 最终修复多选问题
        function batchSearch(buttons) {
            const keyword = searchInput.value.trim();
            const processedSites = new Set(); // 用集合去重
            
            // 遍历所有按钮元素
            for (const button of buttons) {
                const site = button.getAttribute('data-site');
                if (!site || processedSites.has(site)) continue;
                
                processedSites.add(site);

                // 创建搜索URL
                let url;
                if (linkButtons.includes(site)) {
                    url = siteUrls[site];
                } else {
                    url = siteUrls[site] + encodeURIComponent(keyword || '');
                }
                
                window.open(url, '_blank');
            }

            if (keyword) {
                addToHistory(keyword);
            }
        }

            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            // 改进的手机端导出处理
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                // 手机端特殊处理
                const reader = new FileReader();
                reader.onload = function (e) {
                    const modal = document.createElement('div');

                        <a href="${url}" download="搜索历史.json" style="word-break:break-all;">下载搜索历史</a>
                        <p><button style="margin-top:10px;">关闭</button></p>
                    `;

                    box.querySelector('button').addEventListener('click', () => {
                        document.body.removeChild(modal);
                        URL.revokeObjectURL(url);
                    });

                    modal.appendChild(box);
                    document.body.appendChild(modal);
                };
                reader.readAsDataURL(blob);
            } else {
                // PC端正常下载
                const a = document.createElement('a');
                a.href = url;
                a.download = '搜索历史.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }
        }

        // 导入历史记录
        function importHistory() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,.txt';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const content = e.target.result;
                        let newItems = [];
                        
                        try {
                            // 尝试解析为JSON
                            newItems = JSON.parse(content);
                            if (!Array.isArray(newItems)) {
                                throw new Error("Invalid JSON format");
                            }
                        } catch (jsonError) {
                            // 如果不是JSON，尝试解析为旧格式
                            const lines = content.split('\n').filter(line => line.trim());
                            lines.forEach(line => {
                                // 尝试按制表符分割
                                const parts = line.split('\t');
                                if (parts.length >= 2) {
                                    // 旧格式：关键词\t时间戳
                                    newItems.push({ keyword: parts[0], timestamp: parts[1] });
                                } else {
                                    // 旧格式：只有关键词
                                    newItems.push({ keyword: line.trim(), timestamp: new Date().toISOString() });
                                }
                            });
                        }
                        
                        // 将新导入的记录添加到现有记录的前面
                        searchHistory = [...newItems, ...searchHistory];
                        localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                        renderHistory();
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // 编辑历史记录项

                // 设置光标位置（使用点击位置计算）
                setTimeout(() => {
                    historyEditInput.focus();
                    // 使用精确计算方法
                    const text = historyEditInput.value;
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    context.font = window.getComputedStyle(historyEditInput).font;
                    let position = 0;

                    for (let i = 0; i <= text.length; i++) {
                        const width = context.measureText(text.substring(0, i)).width;
                        if (width > clickPosition) {
                            position = i - 1;
                            break;
                        }
                        if (i === text.length) {
                            position = i;
                        }
                    }

                    historyEditInput.setSelectionRange(position, position);
                }, 50);
            }
        }

        // 改进的方向键导航
        function navigateWithArrowKeys(key) {
            const allElements = Array.from(document.querySelectorAll('button, .history-item, input'));
            const currentIndex = allElements.indexOf(currentFocusElement);

            if (currentIndex === -1) {
                const firstFocusable = document.querySelector('button, .history-item, input');
                if (firstFocusable) {
                    firstFocusable.focus();
                    currentFocusElement = firstFocusable;
                }
                return;
            }

            const currentRect = currentFocusElement.getBoundingClientRect();
            let bestCandidate = null;
            let minDistance = Infinity;

            allElements.forEach((el, index) => {
                if (index === currentIndex) return;

                const rect = el.getBoundingClientRect();
                let isCandidate = false;
                let distance = 0;

                if (key === 'ArrowDown') {
                    isCandidate = rect.top > currentRect.bottom - 5;
                    distance = Math.sqrt(
                        Math.pow(rect.left - currentRect.left, 2) +
                        Math.pow(rect.top - currentRect.bottom, 2)
                    );
                } else if (key === 'ArrowUp') {
                    isCandidate = rect.bottom < currentRect.top + 5;
                    distance = Math.sqrt(
                        Math.pow(rect.left - currentRect.left, 2) +
                        Math.pow(currentRect.top - rect.bottom, 2)
                    );
                } else if (key === 'ArrowLeft') {
                    isCandidate = index < currentIndex;
                    distance = currentIndex - index;
                } else if (key === 'ArrowRight') {
                    isCandidate = index > currentIndex;
                    distance = index - currentIndex;
                }

                if (isCandidate && distance < minDistance) {
                    minDistance = distance;
                    bestCandidate = el;
                }
            });

            if (bestCandidate) {
                bestCandidate.focus();
                currentFocusElement = bestCandidate;
                bestCandidate.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // 撤销删除
        function undoDelete() {
            if (lastDeletedItems.length === 0) return;

            lastDeletedItems.forEach(item => {
                // 检查是否已经存在相同关键词的历史项
                const exists = searchHistory.some(historyItem => historyItem.keyword === item.keyword);
                if (!exists && item.historyItem) {
                    // 使用原始的历史项对象（包含时间戳）恢复
                    searchHistory.unshift(item.historyItem);
                }
            });

            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            renderHistory();
            lastDeletedItems = [];
        }
