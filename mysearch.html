<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySearchPage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .search-container {
            display: flex;
            margin-bottom: 12px;
            align-items: center;
            gap: 5px;
            width: 80%;
            max-width: 800px;
            position: relative;
        }
        #search-input {
            padding: 10px 35px 10px 10px;
            font-size: 16px;
            flex-grow: 1;
            border: 1px solid #000;
            width: 100%;
        }
        .clear-input {
            position: absolute;
            right: 3px;
            cursor: pointer;
            font-size: 42px;
            color: #999;
            padding: 8px;
            margin: -8px;
            line-height: 0.7;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 5px;
            width: 80%;
            max-width: 1200px;
        }
        button {
            padding: 6px 10px;
            border: 1px solid #000;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
        }
        button:hover, button.highlight {
            background-color: #f0f0f0;
            box-shadow: 0 0 0 2px #4a90e2;
        }
        .history-container {
            margin-top: 5px;
            width: 80%;
            max-width: 1200px;
        }
        .history-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .history-item {
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 8px;
            padding: 4px 8px;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 14px;
        }
        .history-item.highlight {
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px #4a90e2;
        }
        .history-item.editable {
            border: 1px dashed #000;
            background-color: #fff9f9;
        }
        .history-item.selected {
            background-color: #e0e0e0;
        }
        .control-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
            flex-wrap: wrap;
            width: 80%;
            max-width: 1200px;
        }
        #quick-search-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: block;
            z-index: 100;
        }
        #current-keys {
            font-weight: bold;
            color: #4a90e2;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        .edit-history-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .edit-history-modal input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .edit-history-modal button {
            padding: 6px 12px;
            margin-right: 5px;
        }

        /* 新增的CSS规则，确保按钮在移动端与屏幕左边缘对齐，并且紧凑排列 */
        @media (max-width: 768px) {
            body {
            margin: 5px;
        }
        .search-container {
            margin-bottom: 8px;
            gap: 4px;
        }
        #search-input {
            padding: 4px 4px;
            font-size: 16px;
            border: 1px solid #000;
        }
        .btn-group, .control-buttons {
            justify-content: flex-start; /* 左对齐 */
            width: 100%; /* 宽度为100% */
            padding: 0; /* 移除内边距 */
        }
        button {
            padding: 2px 1px; /* 减少内边距 */
            font-size: 14px; /* 减小字体大小 */
            margin: 0px; /* 减少按钮之间的间距 */
            width: auto; /* 按钮宽度自动调整 */
        }
        button:hover, button.highlight {
            box-shadow: 0 0 0 1px #4a90e2;
        }
         .history-container {
            margin-top: 0px;
            width: 100%;
        }
        .history-title {
        font-size: 14px;
        justify-content: flex-start; /* 左对齐 */
        margin-bottom: 2px;
    }
        .history-item {
            display: inline-block;
            padding: 2px 2px;
            border: 1px solid #ddd;
            font-size: 14px;
            margin: 1px; 
        }
        }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" id="search-input" autocomplete="off">
        <span class="clear-input" title="清空输入">×</span>
    </div>

    <div class="control-buttons">
        <button id="save-only">仅保存</button>
        <button id="all-sites">所有</button>
        <button id="common-sites">常用</button>
        <button id="foreign-sites">外网</button>
        <button id="clear-history">清除历史</button>
        <button id="edit-history">编辑历史</button>
        <button id="export-history">导出历史</button>
        <button id="import-history">导入历史</button>
    </div>

    <div class="btn-group">
        <button data-site="xiaohongshu">小红书</button>
        <button data-site="douyin">抖音</button>
        <button data-site="douyin-history">搜索记录</button>
        <button data-site="douyin-fav">收藏夹</button>
        <button data-site="zhihu">知乎</button>
        <button data-site="zhihu-history">搜索记录</button>
        <button data-site="zhihu-fav">收藏夹</button>
        <button data-site="bilibili">哔哩哔哩</button>
        <button data-site="bilibili-history">搜索记录</button>
        <button data-site="bilibili-fav">收藏夹</button>
        <button data-site="bing">必应</button>
        <button data-site="baidu">百度</button>
        <button data-site="github">GitHub</button>
        <button data-site="google">谷歌</button>
        <button data-site="twitter">推特</button>
        <button data-site="yandex">Yandex</button>
        <button data-site="mubu">幕布精选社区</button>
        <button data-site="anki">Anki卡牌分享社区</button>
        <button data-site="wandoujia">豌豆荚</button>
        <button data-site="greasyfork">Greasy Fork</button>
        <button data-site="coolapk">酷安</button>
        <button data-site="tongyi">通义千问</button>
        <button data-site="kimi">Kimi</button>
        <button data-site="deepseek">DeepSeek</button>
        <button data-site="ximalaya">喜马拉雅搜索</button>
        <button data-site="pinduoduo">拼多多</button>
        <button data-site="jd">京东</button>
        <button data-site="taobao">淘宝</button>
        <button data-site="weixin">微信搜索</button>
        <button data-site="quicker">Quicker</button>
        <button data-site="lingfengyun">凌风云</button>
        <button data-site="wangpanzhijia">网盘之家</button>
    </div>

    <div class="history-container">
        <div class="history-title">搜索历史</div>
        <div id="history-list"></div>
    </div>

    <div id="quick-search-hint">快速搜索: <span id="current-keys">[无]</span></div>

    <div class="modal" id="error-modal">
        <div class="modal-content">
            <p>请输入搜索关键词！</p>
        </div>
    </div>

    <div class="edit-history-modal" id="edit-history-modal">
        <input type="text" id="history-edit-input">
        <button id="save-edit">保存</button>
        <button id="cancel-edit">取消</button>
    </div>

    <script>
        // 网站搜索URL模板
        const siteUrls = {
            xiaohongshu: 'https://www.xiaohongshu.com/search_result?keyword=',
            douyin: 'https://www.douyin.com/search/',
            'douyin-history': 'https://www.douyin.com/user/self?from_tab_name=main&showTab=record',
            'douyin-fav': 'https://www.douyin.com/user/self?from_tab_name=main&showTab=favorite_collection',
            zhihu: 'https://www.bing.com/search?q=site:zhihu.com ',
            'zhihu-history': 'https://www.zhihu.com/search?type=content&q=',
            'zhihu-fav': 'https://www.zhihu.com/collections/mine',
            bilibili: 'https://search.bilibili.com/all?keyword=',
            'bilibili-history': 'https://www.bilibili.com/history',
            'bilibili-fav': 'https://space.bilibili.com/249112844/favlist?fid=51323344&ftype=create',
            bing: 'https://www.bing.com/search?q=',
            baidu: 'https://www.baidu.com/s?wd=',
            github: 'https://github.com/search?q=',
            google: 'https://www.google.com/search?q=',
            twitter: 'https://twitter.com/search?q=',
            yandex: 'https://yandex.com/search/?text=',
            mubu: 'https://mubu.com/explore/community/search?query=',
            anki: 'https://ankiweb.net/shared/decks/',
            wandoujia: 'https://www.wandoujia.com/',
            greasyfork: 'https://greasyfork.org/zh-CN/scripts?q=',
            coolapk: 'https://www.coolapk.com/search?q=',
            tongyi: 'https://tongyi.aliyun.com/qianwen/?search=',
            kimi: 'https://kimi.moonshot.cn/?q=',
            deepseek: 'https://chat.deepseek.com/',
            ximalaya: 'https://www.ximalaya.com/so/',
            pinduoduo: 'https://yangkeduo.com/search_result.html?search_key=',
            jd: 'https://search.jd.com/Search?keyword=',
            taobao: 'https://s.taobao.com/search?q=',
            weixin: 'https://weixin.sogou.com/weixin?type=2&s_from=input&ie=utf8&query=',
            quicker: 'https://getquicker.net/Search?keyword=',
            lingfengyun: 'https://www.lingfengyun.com/Search/Search?wd=',
            wangpanzhijia: 'https://www.lingfengyun.com/?wd='
        };

        // 常用网站列表
        const commonSites = ['xiaohongshu', 'douyin', 'zhihu', 'bilibili', 'bing', 'baidu', 'github', 'mubu', 'anki', 'tongyi', 'kimi', 'deepseek', 'ximalaya'];
        
        // 外网网站列表
        const foreignSites = ['google', 'twitter', 'yandex', 'github', 'greasyfork'];
        
        // 所有网站列表
        const allSites = Object.keys(siteUrls);

        // 获取DOM元素
        const searchInput = document.getElementById('search-input');
        const historyList = document.getElementById('history-list');
        const saveOnlyBtn = document.getElementById('save-only');
        const clearHistoryBtn = document.getElementById('clear-history');
        const editHistoryBtn = document.getElementById('edit-history');
        const exportHistoryBtn = document.getElementById('export-history');
        const importHistoryBtn = document.getElementById('import-history');
        const allSitesBtn = document.getElementById('all-sites');
        const commonSitesBtn = document.getElementById('common-sites');
        const foreignSitesBtn = document.getElementById('foreign-sites');
        const clearInputBtn = document.querySelector('.clear-input');
        const quickSearchHint = document.getElementById('quick-search-hint');
        const currentKeysDisplay = document.getElementById('current-keys');
        const editHistoryModal = document.getElementById('edit-history-modal');
        const historyEditInput = document.getElementById('history-edit-input');
        const saveEditBtn = document.getElementById('save-edit');
        const cancelEditBtn = document.getElementById('cancel-edit');
        const errorModal = document.getElementById('error-modal');
        let historyItems = [];
        
        // 导航相关变量
        let currentFocusElement = null;
        let selectedElements = [];
        let lastDeletedItems = [];
        
        // 编辑状态标志
        let isEditMode = false;
        let isEditingHistory = false;
        let currentEditItem = null;

        // 快速搜索相关变量
        let quickSearchKeys = '';
        let matchedItems = [];
        let currentMatchIndex = -1;

        // 加载搜索历史
        let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
        renderHistory();

        // 初始化事件监听
        initEventListeners();

        function initEventListeners() {
            // 全局键盘事件（用于快速搜索）
            document.addEventListener('keydown', handleGlobalKeyDown);
            
            // 输入框事件
            searchInput.addEventListener('input', handleInput);
            searchInput.addEventListener('keydown', handleInputKeyDown);
            searchInput.addEventListener('focus', () => {
                currentFocusElement = searchInput;
            });
            
            // 清空输入框按钮
            clearInputBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchInput.focus();
            });

            // 保存但不搜索按钮
            saveOnlyBtn.addEventListener('click', () => {
                const keyword = searchInput.value.trim();
                if (keyword) {
                    addToHistory(keyword);
                    searchInput.value = '';
                } else {
                    showErrorModal();
                }
            });

            // 清除历史按钮
            clearHistoryBtn.addEventListener('click', () => {
                searchHistory = [];
                localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                renderHistory();
            });

            // 编辑历史按钮
            editHistoryBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                isEditMode = !isEditMode;
                editHistoryBtn.textContent = isEditMode ? '退出编辑' : '编辑历史';
                renderHistory();
            });

            // 导出历史按钮
            exportHistoryBtn.addEventListener('click', () => {
                exportHistory();
            });

            // 导入历史按钮
            importHistoryBtn.addEventListener('click', () => {
                importHistory();
            });

            // 批量搜索按钮
            allSitesBtn.addEventListener('click', () => batchSearch(allSites));
            commonSitesBtn.addEventListener('click', () => batchSearch(commonSites));
            foreignSitesBtn.addEventListener('click', () => batchSearch(foreignSites));

            // 为所有搜索按钮添加事件监听
            document.querySelectorAll('.btn-group button').forEach(button => {
                button.addEventListener('click', (e) => {
                    const site = button.getAttribute('data-site');
                    if (e.button === 0) { // 左键点击
                        search(site, true);
                    } else if (e.button === 2) { // 右键点击
                        toggleSelectElement(button);
                    }
                });
                
                // 阻止右键菜单
                button.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                });
                
                button.addEventListener('focus', () => {
                    currentFocusElement = button;
                });
            });

            // 保存编辑的历史记录
            saveEditBtn.addEventListener('click', () => {
                if (currentEditItem && historyEditInput.value.trim()) {
                    const oldKeyword = currentEditItem.getAttribute('data-keyword');
                    const newKeyword = historyEditInput.value.trim();
                    if (oldKeyword !== newKeyword) {
                        removeFromHistory(oldKeyword);
                        addToHistory(newKeyword);
                    }
                    editHistoryModal.style.display = 'none';
                    isEditingHistory = false;
                    currentEditItem = null;
                }
            });

            // 取消编辑历史记录
            cancelEditBtn.addEventListener('click', () => {
                editHistoryModal.style.display = 'none';
                isEditingHistory = false;
                currentEditItem = null;
            });

            // 点击空白处退出编辑模式
            document.addEventListener('click', (e) => {
                if (isEditMode && !e.target.closest('.history-item') && e.target !== editHistoryBtn) {
                    isEditMode = false;
                    editHistoryBtn.textContent = '编辑历史';
                    renderHistory();
                }
                
                // 关闭错误弹窗
                if (errorModal.style.display === 'flex' && e.target === errorModal) {
                    errorModal.style.display = 'none';
                }
            });
            
            // 全局键盘事件
            document.addEventListener('keydown', (e) => {
                // F7聚焦输入框
                if (e.key === 'F7') {
                    e.preventDefault();
                    searchInput.focus();
                }
                // F4清空输入框
                else if (e.key === 'F4') {
                    e.preventDefault();
                    searchInput.value = '';
                    searchInput.focus();
                }
                // ESC退出输入框
                else if (e.key === 'Escape' && document.activeElement === searchInput) {
                    e.preventDefault();
                    searchInput.blur();
                }
                // 方向键导航
                else if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key) && currentFocusElement) {
                    e.preventDefault();
                    navigateWithArrowKeys(e.key);
                }
                // 空格选择当前元素
                else if (e.key === ' ' && currentFocusElement && currentFocusElement !== searchInput) {
                    e.preventDefault();
                    toggleSelectElement(currentFocusElement);
                }
                // Enter键执行操作
                else if (e.key === 'Enter' && currentFocusElement) {
                    e.preventDefault();
                    if (currentFocusElement === searchInput) {
                        // 如果有选中的按钮，执行批量搜索
                        if (selectedElements.length > 0) {
                            const sites = selectedElements.map(el => el.getAttribute('data-site')).filter(site => site);
                            if (sites.length > 0) {
                                batchSearch(sites);
                            }
                        }
                    } else if (currentFocusElement.classList.contains('history-item')) {
                        // 历史记录填充到输入框
                        const keyword = currentFocusElement.getAttribute('data-keyword');
                        searchInput.value = keyword;
                        searchInput.focus();
                        // 移动焦点到第一个按钮
                        const firstButton = document.querySelector('.btn-group button');
                        if (firstButton) {
                            firstButton.focus();
                            currentFocusElement = firstButton;
                        }
                    } else if (currentFocusElement.hasAttribute('data-site')) {
                        // 按钮点击
                        const site = currentFocusElement.getAttribute('data-site');
                        search(site, true);
                    }
                }
                // F2编辑历史记录
                else if (e.key === 'F2' && currentFocusElement && currentFocusElement.classList.contains('history-item')) {
                    e.preventDefault();
                    const keyword = currentFocusElement.getAttribute('data-keyword');
                    editHistoryItem(keyword);
                }
                // Delete或F4删除选中的历史记录
                else if ((e.key === 'Delete' || e.key === 'F4') && selectedElements.length > 0) {
                    e.preventDefault();
                    deleteSelectedHistoryItems();
                }
                // Ctrl+Z撤销删除
                else if (e.key === 'z' && e.ctrlKey && lastDeletedItems.length > 0) {
                    e.preventDefault();
                    undoDelete();
                }
            });
        }
        
        // 显示错误弹窗
        function showErrorModal() {
            errorModal.style.display = 'flex';
        }
        
        // 输入框键盘事件处理
        function handleInputKeyDown(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                // 如果有选中的按钮，执行批量搜索
                if (selectedElements.length > 0) {
                    const sites = selectedElements.map(el => el.getAttribute('data-site')).filter(site => site);
                    if (sites.length > 0) {
                        batchSearch(sites);
                    }
                }
            }
        }
        
        // 方向键导航
        function navigateWithArrowKeys(key) {
            if (!currentFocusElement) return;
            
            let nextElement = null;
            const allFocusableElements = Array.from(document.querySelectorAll('button, .history-item'));
            const currentIndex = allFocusableElements.indexOf(currentFocusElement);
            
            if (key === 'ArrowUp') {
                // 向上移动到上一行的元素
                const rect = currentFocusElement.getBoundingClientRect();
                nextElement = allFocusableElements.slice(0, currentIndex).reverse().find(el => {
                    const elRect = el.getBoundingClientRect();
                    return Math.abs(elRect.left - rect.left) < 20 && elRect.top < rect.top;
                });
            } else if (key === 'ArrowDown') {
                // 向下移动到下一行的元素
                const rect = currentFocusElement.getBoundingClientRect();
                nextElement = allFocusableElements.slice(currentIndex + 1).find(el => {
                    const elRect = el.getBoundingClientRect();
                    return Math.abs(elRect.left - rect.left) < 20 && elRect.top > rect.top;
                });
            } else if (key === 'ArrowLeft') {
                // 向左移动
                if (currentIndex > 0) {
                    nextElement = allFocusableElements[currentIndex - 1];
                }
            } else if (key === 'ArrowRight') {
                // 向右移动
                if (currentIndex < allFocusableElements.length - 1) {
                    nextElement = allFocusableElements[currentIndex + 1];
                }
            }
            
            if (nextElement) {
                nextElement.focus();
                currentFocusElement = nextElement;
                // 滚动到可见区域
                nextElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
        
        // 切换元素选中状态
        function toggleSelectElement(element) {
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedElements = selectedElements.filter(el => el !== element);
            } else {
                element.classList.add('selected');
                selectedElements.push(element);
            }
        }
        
        // 删除选中的历史记录
        function deleteSelectedHistoryItems() {
            const itemsToDelete = selectedElements.filter(el => el.classList.contains('history-item'));
            if (itemsToDelete.length === 0) return;
            
            // 保存被删除的项以便撤销
            lastDeletedItems = itemsToDelete.map(item => ({
                keyword: item.getAttribute('data-keyword'),
                element: item
            }));
            
            // 从历史记录中移除
            itemsToDelete.forEach(item => {
                const keyword = item.getAttribute('data-keyword');
                removeFromHistory(keyword);
            });
            
            // 清除选中状态
            selectedElements = selectedElements.filter(el => !el.classList.contains('history-item'));
        }
        
        // 撤销删除
        function undoDelete() {
            if (lastDeletedItems.length === 0) return;
            
            lastDeletedItems.forEach(item => {
                if (!searchHistory.includes(item.keyword)) {
                    searchHistory.unshift(item.keyword);
                }
            });
            
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            renderHistory();
            lastDeletedItems = [];
        }

        // 全局键盘事件处理（快速搜索）
        function handleGlobalKeyDown(e) {
            // 如果输入框有焦点，则不处理快速搜索
            if (document.activeElement === searchInput) return;
            
            // ESC键处理逻辑
            if (e.key === 'Escape') {
                if (isEditMode) {
                    // 优先退出快速搜索
                    if (quickSearchKeys) {
                        quickSearchKeys = '';
                        updateQuickSearchDisplay();
                        clearMatches();
                    } else {
                        // 退出编辑模式
                        isEditMode = false;
                        editHistoryBtn.textContent = '编辑历史';
                        renderHistory();
                    }
                } else {
                    // 清除快速搜索
                    quickSearchKeys = '';
                    updateQuickSearchDisplay();
                    clearMatches();
                }
                // 关闭编辑历史模态框
                if (isEditingHistory) {
                    editHistoryModal.style.display = 'none';
                    isEditingHistory = false;
                    currentEditItem = null;
                }
                // 关闭错误弹窗
                if (errorModal.style.display === 'flex') {
                    errorModal.style.display = 'none';
                }
                return;
            }
            
            // 只处理字母键
            if (e.key.length === 1 && e.key.match(/[a-z]/i)) {
                e.preventDefault();
                
                // 添加按键到快速搜索字符串
                quickSearchKeys += e.key.toLowerCase();
                updateQuickSearchDisplay();
                
                // 执行快速搜索
                performQuickSearch();
            }
            // Enter键激活当前匹配项
            else if (e.key === 'Enter' && matchedItems.length > 0) {
                e.preventDefault();
                activateCurrentMatch();
            }
            // Tab键切换匹配项
            else if (e.key === 'Tab' && matchedItems.length > 0) {
                e.preventDefault();
                cycleMatches(e.shiftKey ? -1 : 1);
            }
        }

        // 更新快速搜索显示
        function updateQuickSearchDisplay() {
            currentKeysDisplay.textContent = quickSearchKeys || '[无]';
        }

        // 执行快速搜索
        function performQuickSearch() {
            // 清除之前的高亮
            clearMatches();
            
            if (!quickSearchKeys) return;
            
            // 将搜索键按空格分割
            const searchTerms = quickSearchKeys.toLowerCase().split(' ').filter(term => term);
            
            // 匹配所有按钮（包括顶部按钮）
            document.querySelectorAll('button').forEach(button => {
                const text = button.textContent;
                const pinyinInitials = getPinyinInitials(text);
                const lowerText = text.toLowerCase();
                
                if (matchQuickSearch(lowerText, pinyinInitials, searchTerms)) {
                    matchedItems.push({
                        element: button,
                        type: 'button'
                    });
                    button.classList.add('highlight');
                }
            });
            
            // 匹配历史记录
            historyItems.forEach(item => {
                const text = item.textContent;
                const pinyinInitials = getPinyinInitials(text);
                const lowerText = text.toLowerCase();
                
                if (matchQuickSearch(lowerText, pinyinInitials, searchTerms)) {
                    matchedItems.push({
                        element: item,
                        type: 'history'
                    });
                    item.classList.add('highlight');
                }
            });
            
            // 如果有匹配项，默认选中第一个
            if (matchedItems.length > 0) {
                currentMatchIndex = 0;
                highlightCurrentMatch();
            }
        }

        // 使用拼音库获取拼音首字母
        function getPinyinInitials(text) {
            // 这里需要引入一个拼音库，例如 https://github.com/u sessun/pinyin.js
            // 由于无法直接访问 GitHub，你可以手动下载该库并引入到项目中
            // 以下是一个简化的示例，实际应用中请使用完整的拼音库

            // 简化映射表（示例）
            const pinyinMap = {
                '小': 'x', '红': 'h', '书': 's', '抖': 'd', '音': 'y', '知': 'z', '乎': 'h',
                '哔': 'b', '哩': 'l', '必': 'b', '应': 'y', '谷': 'g', '歌': 'g', '推': 't',
                '特': 't', '幕': 'm', '布': 'b', '安': 'a', '卡': 'k', '牌': 'p', '分': 'f',
                '享': 'x', '社': 's', '区': 'q', '豌': 'w', '豆': 'd', '荚': 'j', '酷': 'k',
                '通': 't', '义': 'y', '千': 'q', '问': 'w', '喜': 'x', '马': 'm', '拉': 'l',
                '雅': 'y', '微': 'w', '信': 'x', '淘': 't', '宝': 'b', '京': 'j', '东': 'd',
                '头': 't', '条': 't', '百': 'b', '度': 'd', '网': 'w', '易': 'y', '搜': 's',
                '狗': 'g', '神': 's', '奇': 'q', '多': 'd', '快': 'k', '好': 'h', '有': 'y',
                '道': 'd', '今': 'j', '日': 'r', '热': 'r', '点': 'd', '精': 'j', '选': 'x',
                '清': 'q', '除': 'c', '历': 'l', '史': 's', '导': 'd', '出': 'c', '外': 'w',
                '网': 'w', '所': 's', '有': 'y', '常': 'c', '用': 'y', '编': 'b', '辑': 'j',
                '仅': 'j', '保': 'b', '存': 'c', '微': 'w', '信': 'x', '凌': 'l', '风': 'f',
                '云': 'y', '盘': 'p', '之': 'z', '家': 'j', '快': 'k', '速': 's', '搜': 's',
                '索': 's', '记': 'j', '录': 'l', '藏': 'c'
            };

            return text.split('').map(char => {
                // 如果是中文且在映射表中
                if (/[\u4e00-\u9fa5]/.test(char) && pinyinMap[char]) {
                    return pinyinMap[char];
                }
                // 如果是字母
                else if (/[a-zA-Z]/.test(char)) {
                    return char.toLowerCase();
                }
                return '';
            }).join('');
        }

        // 快速搜索匹配算法
        function matchQuickSearch(text, pinyinInitials, searchTerms) {
            // 检查所有搜索词是否都匹配
            return searchTerms.every(term => {
                // 优先检查拼音首字母
                if (pinyinInitials.includes(term)) return true;
                
                // 然后检查原始文本
                if (text.includes(term)) return true;
                
                return false;
            });
        }

        // 清除所有匹配高亮
        function clearMatches() {
            matchedItems.forEach(item => {
                item.element.classList.remove('highlight');
            });
            matchedItems = [];
            currentMatchIndex = -1;
        }

        // 循环切换匹配项
        function cycleMatches(direction) {
            if (matchedItems.length === 0) return;
            
            // 移除当前高亮
            if (currentMatchIndex >= 0) {
                matchedItems[currentMatchIndex].element.classList.remove('highlight');
            }
            
            // 计算新索引
            currentMatchIndex = (currentMatchIndex + direction + matchedItems.length) % matchedItems.length;
            
            // 添加新高亮
            highlightCurrentMatch();
        }

        // 高亮当前匹配项
        function highlightCurrentMatch() {
            if (currentMatchIndex >= 0 && currentMatchIndex < matchedItems.length) {
                const currentItem = matchedItems[currentMatchIndex];
                currentItem.element.classList.add('highlight');
                currentItem.element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // 激活当前匹配项
        function activateCurrentMatch() {
            if (currentMatchIndex >= 0 && currentMatchIndex < matchedItems.length) {
                const currentItem = matchedItems[currentMatchIndex];
                
                if (currentItem.type === 'button') {
                    // 特殊处理有data-site属性的按钮
                    if (currentItem.element.hasAttribute('data-site')) {
                        const site = currentItem.element.getAttribute('data-site');
                        const keyword = searchInput.value.trim() || currentItem.element.textContent;
                        const url = siteUrls[site] + encodeURIComponent(keyword);
                        window.open(url, '_blank');
                    } else {
                        // 直接触发按钮点击
                        currentItem.element.click();
                    }
                } else if (currentItem.type === 'history') {
                    searchInput.value = currentItem.element.textContent;
                    searchInput.focus();
                }
                
                // 重置快速搜索
                quickSearchKeys = '';
                updateQuickSearchDisplay();
                clearMatches();
            }
        }

        // 渲染搜索历史
        function renderHistory() {
            historyList.innerHTML = '';
            historyItems = [];
            
            searchHistory.forEach(keyword => {
                const item = document.createElement('div');
                item.className = 'history-item';
                if (isEditMode) {
                    item.classList.add('editable');
                }
                item.textContent = keyword;
                item.setAttribute('data-keyword', keyword);
                item.tabIndex = 0; // 使历史项可聚焦
                
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (isEditMode) {
                        if (e.button === 0) { // 左键点击
                            removeFromHistory(keyword);
                        } else if (e.button === 2) { // 右键点击
                            toggleSelectElement(item);
                        }
                    } else {
                        if (e.button === 0) { // 左键点击
                            searchInput.value = keyword;
                            searchInput.focus();
                        } else if (e.button === 2) { // 右键点击
                            toggleSelectElement(item);
                        }
                    }
                });
                
                item.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    if (isEditMode) {
                        editHistoryItem(keyword);
                    }
                });
                
                item.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                });
                
                item.addEventListener('focus', () => {
                    currentFocusElement = item;
                });
                
                historyList.appendChild(item);
                historyItems.push(item);
            });
        }

        // 从历史记录中移除
        function removeFromHistory(keyword) {
            searchHistory = searchHistory.filter(item => item !== keyword);
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            renderHistory();
        }

        // 添加到搜索历史
        function addToHistory(keyword) {
            if (!searchHistory.includes(keyword)) {
                searchHistory.unshift(keyword);
                localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                renderHistory();
            }
        }

        // 搜索功能
        function search(site, immediate = false) {
            const keyword = searchInput.value.trim();
            
            // 特殊处理Kimi、DeepSeek和通义千问
            if (['kimi', 'deepseek', 'tongyi'].includes(site)) {
                if (keyword) {
                    // 复制到剪贴板
                    navigator.clipboard.writeText(keyword).then(() => {
                        console.log('关键词已复制到剪贴板');
                    }).catch(err => {
                        console.error('无法复制到剪贴板:', err);
                    });
                }
                const url = siteUrls[site];
                window.open(url, '_blank');
                return;
            }
            
            if (keyword) {
                addToHistory(keyword);
                const url = siteUrls[site] + encodeURIComponent(keyword);
                window.open(url, '_blank');
            } else if (!immediate) {
                showErrorModal();
            } else {
                // 立即打开网站（无关键词）
                const url = siteUrls[site];
                window.open(url, '_blank');
            }
        }

        // 批量搜索函数
        function batchSearch(sites) {
            const keyword = searchInput.value.trim();
            if (keyword) {
                addToHistory(keyword);
                
                // 分批打开标签页
                let delay = 0;
                for (let i = 0; i < sites.length; i += 2) {
                    setTimeout(() => {
                        const site1 = sites[i];
                        if (site1) {
                            const url1 = siteUrls[site1] + encodeURIComponent(keyword);
                            window.open(url1, '_blank');
                        }
                        
                        const site2 = sites[i+1];
                        if (site2) {
                            const url2 = siteUrls[site2] + encodeURIComponent(keyword);
                            window.open(url2, '_blank');
                        }
                    }, delay);
                    
                    delay += 1000;
                }
            } else {
                showErrorModal();
            }
        }

        // 导出历史记录
        function exportHistory() {
            if (searchHistory.length === 0) return;
            
            const content = searchHistory.join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '搜索历史.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 导入历史记录
        function importHistory() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const content = e.target.result;
                        const lines = content.split('\n').filter(line => line.trim());
                        searchHistory = lines.concat(searchHistory);
                        localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                        renderHistory();
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // 编辑历史记录项
        function editHistoryItem(keyword) {
            isEditingHistory = true;
            currentEditItem = document.querySelector(`.history-item[data-keyword="${keyword}"]`);
            if (currentEditItem) {
                historyEditInput.value = keyword;
                editHistoryModal.style.display = 'block';
                historyEditInput.focus();
            }
        }

        // 输入框输入事件处理
        function handleInput() {
            // 如果有历史记录匹配，显示匹配项
            if (!isEditMode) {
                const keyword = searchInput.value.trim();
                if (keyword) {
                    const matchedHistory = searchHistory.filter(item => item.includes(keyword));
                    if (matchedHistory.length > 0) {
                        // 在输入框下方显示匹配的历史记录
                        // 这需要额外的 UI 实现
                        console.log('Matched history:', matchedHistory);
                    }
                }
            }
        }
    </script>
