            // 从Gitee同步功能
            async function syncFromGitee() {
                // 获取配置
                const giteeConfig = JSON.parse(localStorage.getItem('giteeConfig') || '{}');
                
                // 检查配置
                if (!giteeConfig.owner || !giteeConfig.repo || !giteeConfig.path || !giteeConfig.token) {
                    alert('请先配置Gitee仓库信息');
                    openGiteeConfigModal();
                    return;
                }
                
                const { owner, repo, path, token } = giteeConfig;
                const url = `https://gitee.com/api/v5/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}?access_token=${token}&ref=master`;
                
                try {
                    const response = await fetch(url);
                    if (!response.ok) {
                        throw new Error(`获取文件失败: ${response.status} ${response.statusText}`);
                    }
                    
                    const fileData = await response.json();
                    if (!fileData.content) {
                        throw new Error('Gitee返回的数据不包含文件内容');
                    }
                    
                    // 解码内容
                    const decodedContent = atob(fileData.content);
                    const newHistory = JSON.parse(decodedContent);
                    
                    // 验证历史记录格式
                    if (!Array.isArray(newHistory)) {
                        throw new Error('同步的数据不是有效的历史记录数组');
                    }
                    
                    // 替换当前历史记录
                    searchHistory = newHistory;
                    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                    renderHistory();
                    alert('同步成功！已加载最新历史记录');
                    
                } catch (error) {
                    const safeUrl = url.replace(/access_token=[^&]+/, 'access_token=***');
                    alert(`从Gitee同步失败: ${error.message}\nURL: ${safeUrl}\n请检查配置和网络连接`);
                }
            }

                siteInput.style.width = '100%';
                siteCell.appendChild(siteInput);

                const urlCell = document.createElement('td');
                const urlInput = document.createElement('input');
                urlInput.type = 'text';
                urlInput.placeholder = 'URL模板';
                urlInput.style.width = '100%';
                urlCell.appendChild(urlInput);

                const actionCell = document.createElement('td');
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '删除';
                deleteBtn.addEventListener('click', () => row.remove());

            document.getElementById('save-settings').addEventListener('click', async function () {
                try {
                    // 收集表格数据并更新siteUrls
                    const newSiteUrls = {};

                    const rows = document.querySelectorAll('#sites-table-body tr');

                    rows.forEach(row => {

                                });

                        }

                        const button = document.createElement('button');
                        button.textContent = btnConfig.name;

                            button.classList.add('small');
                        }

                    alert('保存设置出错: ' + error.message);
                }
            });

            // 上传网站配置到Gitee
            document.getElementById('upload-sites-config').addEventListener('click', async function() {
                try {
                    const giteeConfig = JSON.parse(localStorage.getItem('giteeConfig') || '{}');
                    
                    if (!giteeConfig.owner || !giteeConfig.repo || !giteeConfig.sitesPath || !giteeConfig.token) {
                        alert('请先配置Gitee仓库信息');
                        openGiteeConfigModal();
                        return;
                    }
                    
                    // 收集当前网站配置数据
                    const siteConfigData = {
                        siteUrls: siteUrls,
                        buttonConfig: []
                    };
                    
                    // 收集按钮配置信息
                    document.querySelectorAll('.btn-group button[data-site]').forEach(button => {
                        siteConfigData.buttonConfig.push({
                            name: button.textContent,
                            dataSite: button.getAttribute('data-site'),
                            isSmall: button.classList.contains('small')
                        });
                    });
                    
                    const { owner, repo, sitesPath, token } = giteeConfig;
                    const content = JSON.stringify(siteConfigData, null, 2);
                    
                    // 编码内容
                    const encoder = new TextEncoder();
                    const encodedContent = btoa(String.fromCharCode(...encoder.encode(content)));
                    
                    // 获取文件当前SHA值（如果存在）
                    const getUrl = `https://gitee.com/api/v5/repos/${owner}/${repo}/contents/${encodeURIComponent(sitesPath)}?access_token=${token}&ref=master`;
                    
                    let sha = null;
                    try {
                        const getResponse = await fetch(getUrl);
                        if (getResponse.ok) {
                            const fileInfo = await getResponse.json();
                            sha = fileInfo.sha;
                        }
                    } catch (error) {
                        // 文件不存在，忽略错误
                    }
                    
                    // 准备更新数据
                    const giteeData = {
                        message: '同步网站配置: ' + new Date().toLocaleString(),
                        content: encodedContent,
                        access_token: token,
                        branch: 'master',
                        sha: sha
                    };
                    
                    const putUrl = `https://gitee.com/api/v5/repos/${owner}/${repo}/contents/${encodeURIComponent(sitesPath)}`;
                    
                    const putResponse = await fetch(putUrl, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(giteeData)
                    });
                    
                    if (!putResponse.ok) {
                        const errorText = await putResponse.text();
                        throw new Error(`更新文件失败: ${putResponse.status} - ${errorText}`);
                    }
                    
                    alert('网站配置上传成功!');
                    
                } catch (error) {

            // 从Gitee下载网站配置
            document.getElementById('download-sites-config').addEventListener('click', async function() {
                try {
                    const giteeConfig = JSON.parse(localStorage.getItem('giteeConfig') || '{}');
                    
                    if (!giteeConfig.owner || !giteeConfig.repo || !giteeConfig.sitesPath || !giteeConfig.token) {

                    const { owner, repo, sitesPath, token } = giteeConfig;

                    const response = await fetch(url);
                    if (!response.ok) {
                        throw new Error(`获取文件失败: ${response.status} ${response.statusText}`);
                    }
                    
                    const fileData = await response.json();
                    if (!fileData.content) {
                        throw new Error('Gitee返回的数据不包含文件内容');
                    }
                    
                    // 解码内容

                    const siteConfigData = JSON.parse(decodedContent);
                    
                    // 验证数据格式
                    if (!siteConfigData.siteUrls || !siteConfigData.buttonConfig) {

                    }
                    
                    // 更新全局siteUrls
                    siteUrls = siteConfigData.siteUrls;

                    saveSiteConfigLocally(siteConfigData);
                    
                    alert('网站配置下载成功！已应用最新配置并保存到本地');
                    
                    // 如果设置模态框是打开的，刷新其内容
                    if (document.getElementById('settings-modal').style.display !== 'none') {
                        populateSettingsTable();
                    }
                    
                } catch (error) {
                    alert(`下载网站配置失败: ${error.message}`);
                }
            });



            // 同步到Gitee功能 - 复用导出逻辑
            // 同步到Gitee功能 - 完整实现（异步）
            document.getElementById('sync-gitee').addEventListener('click', async function() {
                // 直接使用导出功能的数据
                if (searchHistory.length === 0) {
                    alert('没有历史记录可同步');
                    return;
                }
                
                // 从localStorage获取Gitee配置
                const giteeConfig = JSON.parse(localStorage.getItem('giteeConfig') || '{}');
                
                // 如果配置不存在，提示用户设置
                if (!giteeConfig.owner || !giteeConfig.repo || !giteeConfig.path || !giteeConfig.token) {
                    alert('请先配置Gitee仓库信息');
                    openGiteeConfigModal();
                    return;
                }
                
                const { owner, repo, path, token } = giteeConfig;
                const content = JSON.stringify(searchHistory, null, 2);
                
                // 正确编码内容 - 使用TextEncoder处理UTF-8
                const encoder = new TextEncoder();
                const encodedContent = btoa(String.fromCharCode(...encoder.encode(content)));
                
                // 获取文件当前SHA值（如果存在）
                const getUrl = `https://gitee.com/api/v5/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}?access_token=${token}&ref=master`;
                
                try {
                    // 先尝试获取文件信息
                    const getResponse = await fetch(getUrl);
                    let sha = null;
                    
                    if (getResponse.ok) {
                        const fileInfo = await getResponse.json();
                        sha = fileInfo.sha;
                    } else if (getResponse.status !== 404) {
                        // 如果不是404错误，抛出异常
                        const errorText = await getResponse.text();
                        throw new Error(`获取文件信息失败: ${getResponse.status} - ${errorText}`);
                    }
                    
                    // 准备更新数据
                    const giteeData = {
                        message: '同步搜索历史记录: ' + new Date().toLocaleString(),
                        content: encodedContent,
                        access_token: token,
                        branch: 'master',
                        sha: sha // 添加SHA值
                    };
                    
                    const putUrl = `https://gitee.com/api/v5/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`;
                    
                    const putResponse = await fetch(putUrl, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(giteeData)
                    });
                    
                    if (!putResponse.ok) {
                        const errorText = await putResponse.text();
                        throw new Error(`更新文件失败: ${putResponse.status} - ${errorText}`);
                    }
                    
                    const data = await putResponse.json();
                    if (data.content) {
                        alert('同步成功!');
                    } else {
                        alert('同步失败: ' + (data.message || JSON.stringify(data)));
                    }
                } catch (error) {
                    // 显示详细的错误信息
                    const safeUrl = getUrl.replace(/access_token=[^&]+/, 'access_token=***');
                    alert(`同步出错: ${error.message}\nURL: ${safeUrl}\n请检查仓库配置是否正确`);
                }
            });
            
            // 打开Gitee配置模态框
            function openGiteeConfigModal() {
                const modal = document.createElement('div');
                modal.style.position = 'fixed';
                modal.style.top = '0';
                modal.style.left = '0';
                modal.style.width = '100%';
                modal.style.height = '100%';
                modal.style.backgroundColor = 'rgba(0,0,0,0.7)';
                modal.style.display = 'flex';
                modal.style.justifyContent = 'center';
                modal.style.alignItems = 'center';
                modal.style.zIndex = '2000';
                
                const box = document.createElement('div');
                box.style.backgroundColor = 'white';
                box.style.padding = '20px';
                box.style.borderRadius = '5px';
                box.style.width = '300px';
                
                // 获取现有配置
                const config = JSON.parse(localStorage.getItem('giteeConfig') || '{}');
                
                box.innerHTML = `
                    <h3 style="margin-top:0">Gitee仓库配置</h3>
                    <div style="margin-bottom:10px">
                        <label>账号(owner):</label>
                        <input type="text" id="gitee-owner" value="${config.owner || ''}" style="width:100%">
                    </div>
                    <div style="margin-bottom:10px">
                        <label>仓库名(repo):</label>
                        <input type="text" id="gitee-repo" value="${config.repo || ''}" style="width:100%">
                    </div>
                    <div style="margin-bottom:10px">
                        <label>历史记录文件路径:</label>
                        <input type="text" id="gitee-path" value="${config.path || 'history.json'}" style="width:100%">
                    </div>
                    <div style="margin-bottom:10px">
                        <label>网站配置文件路径:</label>
                        <input type="text" id="gitee-sites-path" value="${config.sitesPath || 'SiteUrls.json'}" style="width:100%">
                    </div>
                    <div style="margin-bottom:15px">
                        <label>访问令牌(token):</label>
                        <input type="password" id="gitee-token" value="${config.token || ''}" style="width:100%">
                    </div>
                    <div>
                        <button id="save-gitee-config">保存配置</button>
                    </div>
                `;
                
                box.querySelector('#save-gitee-config').addEventListener('click', function() {
                    const owner = document.getElementById('gitee-owner').value.trim();
                    const repo = document.getElementById('gitee-repo').value.trim();
                    const path = document.getElementById('gitee-path').value.trim();
                    const sitesPath = document.getElementById('gitee-sites-path').value.trim();
                    const token = document.getElementById('gitee-token').value.trim();
                    
                    if (!owner || !repo || !path || !sitesPath || !token) {
                        alert('所有字段都必须填写');
                        return;
                    }
                    
                    localStorage.setItem('giteeConfig', JSON.stringify({ owner, repo, path, sitesPath, token }));
                    document.body.removeChild(modal);
                    alert('配置已保存!');
                });
                
                // 点击模态框外关闭
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) {
                        document.body.removeChild(modal);
                    }
                });
                
                // ESC键关闭
                const handleEscape = function(e) {
                    if (e.key === 'Escape') {
                        document.body.removeChild(modal);
                        document.removeEventListener('keydown', handleEscape);
                    }
                };
                document.addEventListener('keydown', handleEscape);
                
                modal.appendChild(box);
                document.body.appendChild(modal);
            }
        });

        // 重新绑定按钮事件
        function bindButtonEvents() {
            document.querySelectorAll('.btn-group button[data-site]').forEach(button => {
                button.addEventListener('click', (e) => {
                    const site = button.getAttribute('data-site');
                    if (e.button === 0) { // 左键点击
                        if (selectedElements.length > 0 && selectedElements.includes(button)) {
                            toggleSelectElement(button);
                        } else {
                            search(site, true);
                        }
                    }
                });

                // 右键点击多选
                button.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    toggleSelectElement(button);
                });

                button.addEventListener('focus', () => {
                    if (!quickSearchActive) {
                        currentFocusElement = button;
                        quickSearchKeys = '';
                        updateQuickSearchDisplay();
                        clearMatches();
                    }
                    updatePositionMemory(); // 更新位置记忆
                });
            });
        }

        // 撤销删除（使用IndexedDB）
        async function undoDelete() {
            if (lastDeletedItems.length === 0) return;

            try {
                for (const item of lastDeletedItems) {
                    // 检查是否已经存在相同关键词的历史项
                    const exists = searchHistory.some(historyItem => historyItem.keyword === item.keyword);
                    if (!exists && item.historyItem) {
                        // 恢复到IndexedDB
                        await searchHistoryDB.addHistory(item.historyItem.keyword);
                        
                        // 更新本地数组
                        searchHistory.unshift(item.historyItem);
                    }
                }
                
                renderHistory();
                lastDeletedItems = [];
            } catch (error) {
                console.error('撤销删除失败:', error);
                // 如果IndexedDB失败，仍然更新本地数组
                lastDeletedItems.forEach(item => {
                    const exists = searchHistory.some(historyItem => historyItem.keyword === item.keyword);
                    if (!exists && item.historyItem) {
                        searchHistory.unshift(item.historyItem);
                    }
                });
                
                renderHistory();
                lastDeletedItems = [];
            }
        }
        <!-- 保留文件原有内容 -->
        
        // 修复的adjustScrollableArea函数 - 确保historyitem在所有窗口尺寸下都正确显示
        function adjustScrollableArea() {
            const fixedHeader = document.querySelector('.fixed-header');
            const scrollableContent = document.querySelector('.scrollable-content');
            
            if (!fixedHeader || !scrollableContent) {
                return;
            }
            
            // 强制重新测量header高度
            const headerHeight = fixedHeader.getBoundingClientRect().height;
            const safeMarginTop = Math.ceil(headerHeight) + 2; // 使用2px作为安全边距
            
            // 仅设置必要的margin-top和height，保留CSS文件中的padding用于对齐
            scrollableContent.style.marginTop = safeMarginTop + 'px';
            scrollableContent.style.height = `calc(100vh - ${safeMarginTop}px)`;
        }
        
        // 在窗口尺寸变化时重新应用修复
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(adjustScrollableArea, 100);
        });
        
        // 页面加载完成后和定期检查并应用修复（处理异步加载问题）
        // document.addEventListener('DOMContentLoaded', adjustScrollableArea); // 移动到初始化函数中
        // window.addEventListener('load', adjustScrollableArea); // 移动到初始化函数中
        
        // 定期检查（前5秒） - 这个方式不太好，移除
        // const intervalId = setInterval(adjustScrollableArea, 1000);
        // setTimeout(() => clearInterval(intervalId), 5000);

        // 页面初始化：立即加载配置和历史记录
        async function initializePage() {
            console.log('开始初始化页面...');
            try {
                // 立即加载网站配置
                await loadSiteConfig();
                console.log('网站配置加载完成');
                
                // 立即加载历史记录
                await loadSearchHistory();
                console.log('历史记录加载完成');
                
                // 确保UI更新
                // adjustScrollableArea();
                // 渲染历史后，再次调用以确保布局正确
                setTimeout(adjustScrollableArea, 50); // 给予一个小的延迟确保DOM更新
            } catch (error) {
                console.error('页面初始化失败:', error);
            }
        }

        // 立即执行初始化，不等待DOMContentLoaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializePage);
        } else {
            // 文档已经加载完成，立即执行
            initializePage();
        }

    </script>
