<html lang="zh-CN"><head>
    <meta charset="UTF-8">

    <title>MySearchPage</title>
    <style>
        .flex1 {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .flex2 {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px 40px 8px 20px;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 固定顶部区域 */
        .fixed-header {
            position: fixed;
            top: 0;
            background: white;
            gap: 10px;
            z-index: 100;
            /* padding: 10px 20px 8px 20px; */
            /* 调整底部内边距 */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);

            /* 增大底部外边距 */
            touch-action: none;
            -webkit-overflow-scrolling: touch;
        }

        .search-container {
            /* display: flex; */
            /* margin-bottom: 12px; */
            align-items: center;
            /* gap: 5px; */
            width: 100%;
            position: relative;
        }

        #search-input {
            padding: 10px 35px 10px 10px;
            font-size: 16px;
            /* flex-grow: 1; */
            border: 1px solid #000;
            width: 100%;
        }

        .clear-input {
            position: absolute;
            right: 3px;
            cursor: pointer;
            font-size: 42px;
            color: #999;
            padding: 8px;
            margin: -8px;
            line-height: 0.7;
        }

        .control-buttons {
            /* display: flex; */
            /* gap: 5px; */
            align-items: left;
            /* flex-wrap: wrap; */
            flex-grow: 1;
        }

        button {
            padding: 6px 10px;
            border: 1px solid #000;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            /* transition: all 0.2s; */
            text-align: center;
            white-space: normal;
            word-wrap: break-word;
        }

        button.small {
            font-size: 12px;
            padding: 4px 6px;
            line-height: 1.2;
        }

        button.highlight {
            background-color: #f0f0f0;
            box-shadow: 0 0 0 2px #4a90e2;
        }

        button.selected {
            background-color: #e0e0e0;
        }

        .btn-group {
            /* display: flex; */
            /* flex-wrap: wrap; */
            gap: 5px;
            /* margin-bottom: 5px; */
            width: 100%;
        }

        /* 可滚动内容区域 */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            /* padding: 10px 2px 0; */
            margin-top: 60px;
            height: calc(100vh - 160px);

            display: flex;

        }

            font-size: 14px;

            /* position: sticky; */
            top: -15px;
            /* margin-bottom: 0; */
            /* padding: 2px 0; */

            z-index: 10;

            font-size: 14px;

        }

        }

        .history-item.selected {
            background-color: #e0e0e0;
        }

        .modal {

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;

        .modal-content {
            background-color: white;
            padding: 20px;

            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        /* 改为自动宽度 */

        @media (device-width>1200px) {

            button {

            button.highlight {

            padding: 2px 0;

            margin: 2px;

</head>

            name: { ascending: true },

            length: { ascending: true } // 长度默认升序
        };

        // 排序功能（支持双向）
        function sortByName() {
            const state = sortStates.name;
            state.ascending = !state.ascending; // 切换方向
            
            searchHistory.sort((a, b) =>
                state.ascending ? a.localeCompare(b) : b.localeCompare(a)
            );
            
            // 更新按钮文本
            document.getElementById('sort-by-name').textContent =
                `名称 ${state.ascending ? '↑' : '↓'}`;
                
            renderHistory();
        }
        
        function sortByTime() {
            const state = sortStates.time;
            state.ascending = !state.ascending; // 切换方向
            
            const history = JSON.parse(localStorage.getItem('searchHistory')) || [];
            searchHistory = state.ascending ? [...history].reverse() : [...history];
            
            // 更新按钮文本
            document.getElementById('sort-by-time').textContent =
                `时间 ${state.ascending ? '↑' : '↓'}`;
                
            renderHistory();
        }
        
        function sortByLength() {
            const state = sortStates.length;
            state.ascending = !state.ascending; // 切换方向
            
            searchHistory.sort((a, b) =>
                state.ascending ? a.length - b.length : b.length - a.length
            );
            
            // 更新按钮文本
            document.getElementById('sort-by-length').textContent =
                `长度 ${state.ascending ? '↑' : '↓'}`;
                
            renderHistory();

        let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];

        // 点击空白处退出编辑模式或关闭模态框

        // 清除所有匹配高亮
        function clearMatches() {

        // 全局键盘事件处理（快速搜索）
        function handleGlobalKeyDown(e) {
            if (e.key === 'Escape') {
                GlobalQuit(e);

            if (window.screen.width > 768 && !document.activeElement.matches('input, textarea') &&
                e.key.length === 1 && /[a-z0-9\W]/i.test(e.key) && e.key !== ' ') {
                mobileQuickSearch.focus();
                focusQuickSearch(e);
                return;
            }
            // 电脑端快速搜索激活
            if (quickSearchActive && e.key === 'Backspace') {

                        performQuickSearch();

                        clearMatches();
                        showAllHistoryItems();
                        quickSearchActive = false;
                    }
                }
                return;
            }

            // Tab键切换下一个匹配项
            if (e.key === 'Tab' && quickSearchActive && matchedItems.length > 0) {
                e.preventDefault();
                cycleMatches(1); // 下一个匹配项
                return;
            }

            // Ctrl+Tab切换上一个匹配项
            if (e.key === 'Tab' && e.ctrlKey && quickSearchActive && matchedItems.length > 0) {
                e.preventDefault();
                cycleMatches(-1); // 上一个匹配项
                return;
            }

            // 普通Tab键切换焦点
            if (e.key === 'Tab' && !quickSearchActive) {
                e.preventDefault();
                const allElements = Array.from(document.querySelectorAll('button, .history-item, input'));
                const currentIndex = allElements.indexOf(currentFocusElement);
                const nextIndex = (currentIndex + 1) % allElements.length;
                currentFocusElement = allElements[nextIndex];
                currentFocusElement.focus();
                return;
            }

            // Ctrl+Tab返回上一个焦点
            if (e.key === 'Tab' && e.ctrlKey && !quickSearchActive) {
                e.preventDefault();
                const allElements = Array.from(document.querySelectorAll('button, .history-item, input'));
                const currentIndex = allElements.indexOf(currentFocusElement);
                const prevIndex = (currentIndex - 1 + allElements.length) % allElements.length;
                currentFocusElement = allElements[prevIndex];
                currentFocusElement.focus();
                return;
            }

            // Tab键切换下一个匹配项
            if (e.key === 'Tab' && quickSearchActive && matchedItems.length > 0) {
                e.preventDefault();
                cycleMatches(1); // 下一个匹配项
                return;
            }

            // Ctrl+Tab切换上一个匹配项
            if (e.key === 'Tab' && e.ctrlKey && quickSearchActive && matchedItems.length > 0) {
                e.preventDefault();
                cycleMatches(-1); // 上一个匹配项
                return;
            }

            // 处理Ctrl+-取消所有选中
            if (e.key === '-' && e.ctrlKey) {
                e.preventDefault();
                e.stopPropagation();
                clearSelection();
                return;
            }

            if (isEditingHistory) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    saveEditBtn.click();
                    return;
                }

                return;
            }

            // F7聚焦输入框
            if (e.key === 'F7') {
                e.preventDefault();
                searchInput.focus();
                return;
            }

            // 处理控制按钮的Enter键
            const controlButtons = ['save-only', 'all-sites', 'common-sites', 'foreign-sites',
                'edit-history', 'export-history', 'import-history'];
            if (e.key === 'Enter' && currentFocusElement && controlButtons.includes(currentFocusElement.id)) {
                e.preventDefault();
                currentFocusElement.click();
                return;
            }

            // 处理多选后的Enter键
            if (e.key === 'Enter' && selectedElements.length > 0) {
                e.preventDefault();
                const sites = selectedElements.map(el => el.getAttribute('data-site')).filter(site => site);
                if (sites.length > 0) {
                    batchSearch(sites);
                }
                return;
            }

            // 方向键导航
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                // 如果焦点在输入框且是左右方向键，不阻止默认行为
                if (document.activeElement === searchInput && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
                    return;
                }

                e.preventDefault();

                // 快速搜索激活时，使用方向键在匹配项间导航
                if (quickSearchActive && matchedItems.length > 0) {
                    // 如果是第一次按方向键，从第一个匹配项开始
                    if (currentMatchIndex === -1) {
                        currentMatchIndex = 0;
                        highlightCurrentMatch();
                    } else {
                        if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                            cycleMatches(1); // 下一个
                        } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                            cycleMatches(-1); // 上一个
                        }
                    }
                } else {
                    navigateWithArrowKeys(e.key);
                }
                return;
            }

            // 空格选择当前元素
            if (e.key === ' ') {
                // 如果焦点在输入框，不处理空格选择
                if (document.activeElement === searchInput) {
                    return;
                }
                
                e.preventDefault();
                
                // 快速搜索激活时，操作当前匹配项
                if (quickSearchActive && currentMatchIndex >= 0) {
                    const currentItem = matchedItems[currentMatchIndex].element;

                // 非快速搜索模式，操作当前焦点元素（仅按钮）
                else if (currentFocusElement && currentFocusElement.tagName === 'BUTTON') {
                    toggleSelectElement(currentFocusElement);
                }
                return;
            }

            // Enter键执行操作
            if (e.key === 'Enter') {
                e.preventDefault();
                
                // 处理快速搜索虚拟光标
                if (quickSearchActive && matchedItems.length > 0) {
                    const currentItem = matchedItems[currentMatchIndex];
                    if (currentItem.type === 'button') {
                        if (searchInput.value.trim()) {
                            const sites = [currentItem.element.getAttribute('data-site')];
                            batchSearch(sites);
                        }
                    } else if (currentItem.type === 'history') {
                        searchInput.value = currentItem.element.textContent;
                        searchInput.focus();
                    }
                    return;
                }
                
                // 处理实际焦点元素
                if (currentFocusElement) {
                    // 情况1：在按钮组上且搜索框有关键词
                    if (currentFocusElement.hasAttribute('data-site') && searchInput.value.trim()) {
                        const sites = selectedElements.length > 0

                            : [currentFocusElement.getAttribute('data-site')];

                    // 情况2：在历史项上
                    else if (currentFocusElement.classList.contains('history-item')) {

                    // 情况3：在搜索框且有选中的网站
                    else if (currentFocusElement === searchInput && searchInput.value.trim() && selectedElements.length > 0) {

                        batchSearch(sites);

            // F2编辑历史记录
            if (e.key === 'F2' && currentFocusElement && currentFocusElement.classList.contains('history-item')) {
                e.preventDefault();
                const keyword = currentFocusElement.getAttribute('data-keyword');
                editHistoryItem(keyword);

            // Delete或F4删除选中的历史记录
            if (e.key === 'Delete' && selectedElements.length > 0) {

            if ((e.key === 'F8' || (e.ctrlKey && e.key === 'Delete'))) {
                e.preventDefault();

            // Ctrl+Z撤销删除
            if (e.key === 'z' && e.ctrlKey && lastDeletedItems.length > 0) {

                return;

        function GlobalQuit(e) {
            // e.preventDefault();
            if (isEditMode) {
                e.preventDefault();
                cancelEditBtn.click();
                return;

            else if (document.activeElement === searchInput) {

            // ESC只取消快速搜索，不影响选中状态
            else if (mobileQuickSearch.value) {

        // 修改 updateQuickSearchDisplay 函数
        function updateQuickSearchDisplay() {
            // 添加防重复更新检查
            if (mobileQuickSearch.value === quickSearchKeys) return;
            mobileQuickSearch.value = quickSearchKeys || '';
        }
        // 执行快速搜索
        // 修改 performQuickSearch 函数
        function performQuickSearch() {
            const searchTerms = quickSearchKeys.split('').filter(Boolean);
            clearMatches();
            if (searchTerms.length === 0) {
                showAllHistoryItems();
                return; // 关键：必须在这里提前返回
            }
            // 获取所有可搜索元素
            const allElements = document.querySelectorAll('button[data-site], .history-item');
            const historyItems = document.querySelectorAll('.history-item');
            
            // 先显示所有历史项
            showAllHistoryItems();
            
            // 所有元素去高亮
            allElements.forEach(el => {
                el.classList.remove('highlight');
            });

            allElements.forEach(element => {
                const text = element.textContent.toLowerCase();
                const pinyin = getPinyinInitials(text);
                const isChinese = /[\u4e00-\u9fa5]/.test(quickSearchKeys);
                let isMatch = false;

                if (isChinese) {
                    isMatch = searchTerms.every(term => text.includes(term));
                } else {
                    isMatch = searchTerms.every(term =>
                        pinyin.includes(term) || text.includes(term)
                    );
                }
                if (isMatch) {
                    matchedItems.push({
                        element: element,
                        type: element.classList.contains('history-item') ? 'history' : 'button'
                    });
                    element.classList.add('highlight');
                } else {
                    // 只隐藏不匹配的历史项，按钮保持显示
                    if (element.classList.contains('history-item')) {
                        element.style.display = 'none';
                    }
                }
            });

            if (matchedItems.length > 0) {
                currentMatchIndex = 0;
                highlightCurrentMatch();
                // 更新当前焦点元素为第一个匹配项
                currentFocusElement = matchedItems[0].element;
            }
        }
        
        function showAllHistoryItems() {
            document.querySelectorAll('.history-item').forEach(item => {
                item.style.display = 'inline-block';
            });
        }
        // 使用拼音库获取拼音首字母
        function getPinyinInitials(text) {
            const pinyinMap = {
                '小': 'x', '红': 'h', '书': 's', '抖': 'd', '音': 'y', '知': 'z', '乎': 'h',
                '哔': 'b', '哩': 'l', '必': 'b', '应': 'y', '谷': 'g', '歌': 'g', '推': 't',
                '特': 't', '幕': 'm', '布': 'b', '安': 'a', '卡': 'k', '牌': 'p', '分': 'f',
                '享': 'x', '社': 's', '区': 'q', '豌': 'w', '豆': 'd', '荚': 'j', '酷': 'k',
                '通': 't', '义': 'y', '千': 'q', '问': 'w', '喜': 'x', '马': 'm', '拉': 'l',
                '雅': 'y', '微': 'w', '信': 'x', '淘': 't', '宝': 'b', '京': 'j', '东': 'd',
                '头': 't', '条': 't', '百': 'b', '度': 'd', '网': 'w', '易': 'y', '搜': 's',
                '狗': 'g', '神': 's', '奇': 'q', '多': 'd', '快': 'k', '好': 'h', '有': 'y',
                '道': 'd', '今': 'j', '日': 'r', '热': 'r', '点': 'd', '精': 'j', '选': 'x',
                '清': 'q', '除': 'c', '历': 'l', '史': 's', '导': 'd', '出': 'c', '外': 'w',
                '网': 'w', '所': 's', '有': 'y', '常': 'c', '用': 'y', '编': 'b', '辑': 'j',
                '仅': 'j', '保': 'b', '存': 'c', '微': 'w', '信': 'x', '凌': 'l', '风': 'f',
                '云': 'y', '盘': 'p', '之': 'z', '家': 'j', '快': 'k', '速': 's', '搜': 's',
                '索': 's', '记': 'j', '录': 'l', '藏': 'c'
            };
            return text.split('').map(char => {
                // 1. 处理中文字符（严格检测Unicode中文范围）
                if (/[\u4e00-\u9fa5]/.test(char)) {
                    // 优先使用映射表，找不到则尝试其他方法（如使用pinyin库）
                    return pinyinMap[char] || '';
                }
                // 2. 处理英文字母
                else if (/[a-zA-Z]/.test(char)) {
                    return char.toLowerCase();
                }
                // 3. 其他字符（数字、符号等）返回空字符串
                return '';
            }).join('');
        }

        // 快速搜索匹配算法
        function matchQuickSearch(text, pinyinInitials, searchTerms) {
            return searchTerms.every(term => {
                if (pinyinInitials.includes(term)) return true;
                if (text.includes(term)) return true;
                return false;
            });
        }

        // 循环切换匹配项
        function cycleMatches(direction) {
            if (matchedItems.length === 0) return;

            // 移除当前高亮
            if (currentMatchIndex >= 0) {
                matchedItems[currentMatchIndex].element.classList.remove('cursor-highlight');
            }

            // 计算新位置
            currentMatchIndex = (currentMatchIndex + direction + matchedItems.length) % matchedItems.length;

            // 设置新位置并高亮
            highlightCurrentMatch();
            
            // 更新当前焦点元素
            currentFocusElement = matchedItems[currentMatchIndex].element;
        }

        // 高亮当前匹配项
        function highlightCurrentMatch() {
            // 移除之前的光标高亮
            document.querySelectorAll('.cursor-highlight').forEach(el => {
                el.classList.remove('cursor-highlight');
            });
            
            if (currentMatchIndex >= 0 && currentMatchIndex < matchedItems.length) {
                const currentItem = matchedItems[currentMatchIndex];
                currentItem.element.classList.add('cursor-highlight');
                currentItem.element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // 激活当前匹配项
        function activateCurrentMatch() {
            if (currentMatchIndex >= 0 && currentMatchIndex < matchedItems.length) {
                const currentItem = matchedItems[currentMatchIndex];

                if (currentItem.type === 'button') {
                    if (currentItem.element.hasAttribute('data-site')) {
                        const site = currentItem.element.getAttribute('data-site');
                        const keyword = searchInput.value.trim() || currentItem.element.textContent;
                        const url = siteUrls[site] + encodeURIComponent(keyword);
                        window.open(url, '_blank');
                    } else {
                        currentItem.element.click();
                    }
                } else if (currentItem.type === 'history') {
                    searchInput.value = currentItem.element.textContent;
                    searchInput.focus();
                }

                quickSearchKeys = '';
                updateQuickSearchDisplay();
                clearMatches();
                quickSearchActive = false;
            }
        }

        // adjustScrollableArea();
        function adjustScrollableArea() {
            const fixedHeader = document.querySelector('.fixed-header');
            const scrollableContent = document.querySelector('.scrollable-content');
            const fixedHeight = fixedHeader.offsetHeight;

            // 保持冻结线位置计算不变
            scrollableContent.style.marginTop = fixedHeight + 'px';

            // 高度计算需考虑padding（通过box-sizing已处理）
            scrollableContent.style.height = `calc(100vh - ${fixedHeight}px)`;
        }

        // 渲染搜索历史
        function renderHistory() {
            historyList.innerHTML = '';
            historyItems = [];

            searchHistory.forEach(keyword => {
                const item = document.createElement('div');
                item.className = 'history-item';
                if (isEditMode) {
                    item.classList.add('editable');
                }
                item.textContent = keyword;
                item.setAttribute('data-keyword', keyword);
                item.tabIndex = 0;
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (isEditMode) {
                        // 编辑模式下点击直接删除
                        removeFromHistory(keyword);
                    } else {
                        if (e.button === 0) {
                            searchInput.value = keyword;
                            searchInput.focus();
                        } else if (e.button === 2) {
                            toggleSelectElement(item);
                        }
                    }
                });

                item.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    const rect = e.target.getBoundingClientRect();
                    const clickPosition = e.clientX - rect.left; // 计算点击位置
                    editHistoryItem(keyword, clickPosition); // 传递位置参数
                });

                item.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    toggleSelectElement(item);
                });

                item.addEventListener('focus', () => {
                    if (!quickSearchActive) {
                        currentFocusElement = item;
                    }
                });

                historyList.appendChild(item);
                historyItems.push(item);
            });
        }

        // 从历史记录中移除
        function removeFromHistory(keyword) {
            searchHistory = searchHistory.filter(item => item !== keyword);
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            renderHistory();
        }

        // 添加到搜索历史
        function addToHistory(keyword) {
            if (!searchHistory.includes(keyword)) {
                searchHistory.unshift(keyword);
                localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                renderHistory();
            }
        }

        // 搜索功能
        function search(site, immediate = false) {
            const keyword = searchInput.value.trim();

            if (linkButtons.includes(site)) {
                if (keyword) {
                    navigator.clipboard.writeText(keyword).catch(err => {
                        console.error('无法复制到剪贴板:', err);
                    });
                    addToHistory(keyword);
                }
                const url = siteUrls[site];
                window.open(url, '_blank');
                return;
            }

            if (keyword) {
                addToHistory(keyword);
                const url = siteUrls[site] + encodeURIComponent(keyword);
                window.open(url, '_blank');
            }
        }

        // 批量搜索函数
        // 找到原batchSearch函数（约在1580行左右）
        function batchSearch(sites) {
            const keyword = searchInput.value.trim();
            const processedSites = new Set(); // 用集合去重

            // 只执行一次搜索
            sites.forEach(site => {
                if (processedSites.has(site)) return;
                processedSites.add(site);

                if (linkButtons.includes(site)) {
                    const url = siteUrls[site];
                    window.open(url, '_blank');
                } else if (keyword) {
                    const url = siteUrls[site] + encodeURIComponent(keyword);
                    window.open(url, '_blank');
                }
            });

            if (keyword) {
                addToHistory(keyword);
            }
        }

        // 导出历史记录
        function exportHistory() {
            if (searchHistory.length === 0) return;

            const content = searchHistory.join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);

            // 改进的手机端导出处理
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                // 手机端特殊处理
                const reader = new FileReader();
                reader.onload = function (e) {
                    const modal = document.createElement('div');
                    modal.style.position = 'fixed';
                    modal.style.top = '0';
                    modal.style.left = '0';
                    modal.style.right = '0';
                    modal.style.bottom = '0';
                    modal.style.backgroundColor = 'rgba(0,0,0,0.7)';
                    modal.style.display = 'flex';
                    modal.style.justifyContent = 'center';
                    modal.style.alignItems = 'center';
                    modal.style.zIndex = '2000';

                    const box = document.createElement('div');
                    box.style.backgroundColor = 'white';
                    box.style.padding = '20px';
                    box.style.borderRadius = '5px';
                    box.innerHTML = `
                        <p>请长按下方链接选择"下载"或"保存"</p>
                        <a href="${url}" download="搜索历史.txt" style="word-break:break-all;">下载搜索历史</a>
                        <p><button style="margin-top:10px;">关闭</button></p>
                    `;

                    box.querySelector('button').addEventListener('click', () => {
                        document.body.removeChild(modal);
                        URL.revokeObjectURL(url);
                    });

                    modal.appendChild(box);
                    document.body.appendChild(modal);
                };
                reader.readAsDataURL(blob);
            } else {
                // PC端正常下载
                const a = document.createElement('a');
                a.href = url;
                a.download = '搜索历史.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }
        }

        // 导入历史记录
        function importHistory() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const content = e.target.result;
                        const lines = content.split('\n').filter(line => line.trim());
                        searchHistory = lines.concat(searchHistory);
                        localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                        renderHistory();
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // 编辑历史记录项
        function editHistoryItem(keyword, clickPosition) {
            isEditingHistory = true;
            currentEditItem = document.querySelector(`.history-item[data-keyword="${keyword}"]`);
            if (currentEditItem) {
                historyEditInput.value = keyword;
                editHistoryModal.style.display = 'block';

                // 设置光标位置（使用点击位置计算）
                setTimeout(() => {
                    historyEditInput.focus();
                    // 使用精确计算方法
                    const text = historyEditInput.value;
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    context.font = window.getComputedStyle(historyEditInput).font;
                    let position = 0;

                    for (let i = 0; i <= text.length; i++) {
                        const width = context.measureText(text.substring(0, i)).width;
                        if (width > clickPosition) {
                            position = i - 1;
                            break;
                        }
                        if (i === text.length) {
                            position = i;
                        }
                    }

                    historyEditInput.setSelectionRange(position, position);
                }, 50);
            }
        }

            itemsToDelete.forEach(item => {

            });

            selectedElements = selectedElements.filter(el => !el.classList.contains('history-item'));

            if (itemsToDelete.length > 0) {
                const firstDeleted = itemsToDelete[0];
                const allItems = Array.from(document.querySelectorAll('.history-item, button'));
                const index = allItems.indexOf(firstDeleted);

        // 改进的方向键导航
        function navigateWithArrowKeys(key) {
            const allElements = Array.from(document.querySelectorAll('button, .history-item, input'));
            const currentIndex = allElements.indexOf(currentFocusElement);

            if (currentIndex === -1) {
                const firstFocusable = document.querySelector('button, .history-item, input');
                if (firstFocusable) {
                    firstFocusable.focus();
                    currentFocusElement = firstFocusable;
                }
                return;
            }

            const currentRect = currentFocusElement.getBoundingClientRect();
            let bestCandidate = null;
            let minDistance = Infinity;

            allElements.forEach((el, index) => {
                if (index === currentIndex) return;

                const rect = el.getBoundingClientRect();
                let isCandidate = false;
                let distance = 0;

                if (key === 'ArrowDown') {
                    isCandidate = rect.top > currentRect.bottom - 5;
                    distance = Math.sqrt(
                        Math.pow(rect.left - currentRect.left, 2) +
                        Math.pow(rect.top - currentRect.bottom, 2)
                    );
                } else if (key === 'ArrowUp') {
                    isCandidate = rect.bottom < currentRect.top + 5;
                    distance = Math.sqrt(
                        Math.pow(rect.left - currentRect.left, 2) +
                        Math.pow(currentRect.top - rect.bottom, 2)
                    );
                } else if (key === 'ArrowLeft') {
                    isCandidate = index < currentIndex;
                    distance = currentIndex - index;
                } else if (key === 'ArrowRight') {
                    isCandidate = index > currentIndex;
                    distance = index - currentIndex;
                }

                if (isCandidate && distance < minDistance) {
                    minDistance = distance;
                    bestCandidate = el;
                }
            });

            if (bestCandidate) {
                bestCandidate.focus();
                currentFocusElement = bestCandidate;
                bestCandidate.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
