<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的搜索页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 固定顶部区域 */
        .fixed-header {
            background: white;
            z-index: 100;
            padding: 10px 20px 8px 20px;
            /* 调整底部内边距 */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
            /* 增大底部外边距 */
        }

        .header-controls {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 5px;
        }

        .search-container {
            display: flex;
            margin-bottom: 12px;
            align-items: center;
            gap: 5px;
            width: 100%;
            position: relative;
        }

        #search-input {
            padding: 10px 35px 10px 10px;
            font-size: 16px;
            flex-grow: 1;
            border: 1px solid #000;
            width: 100%;
        }

        .clear-input {
            position: absolute;
            right: 3px;
            cursor: pointer;
            font-size: 42px;
            color: #999;
            padding: 8px;
            margin: -8px;
            line-height: 0.7;
        }

        .control-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            flex-grow: 1;
            /* 占据剩余空间 */
            /* width: 100%;
                        margin-bottom: 5px;
                order: -1; /* 移到前面 */
            /* margin-left: 40px; */
        }

        button {
            padding: 6px 10px;
            border: 1px solid #000;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
            white-space: normal;
            word-wrap: break-word;
        }

        button.small {
            font-size: 12px;
            padding: 4px 6px;
            line-height: 1.2;
        }

        button.highlight {
            background-color: #f0f0f0;
            box-shadow: 0 0 0 2px #4a90e2;
        }

        button.selected {
            background-color: #e0e0e0;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 5px;
            width: 100%;
        }

        /* 可滚动内容区域 */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .history-container {
            margin-top: 5px;
            width: 100%;
        }

        .history-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            position: sticky;
            top: -15px;
            margin-bottom: 0;
            padding: 2px 0;
            background: white;
            z-index: 10;
        }

        .history-item {
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 8px;
            padding: 4px 8px;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 14px;
        }

        .history-item.highlight {
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px #4a90e2;
        }

        .history-item.editable {
            border: 1px dashed #000;
            background-color: #fff9f9;
        }

        .history-item.selected {
            background-color: #e0e0e0;
        }

        #quick-search-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: block;
            z-index: 100;
            cursor: pointer;
        }

        #current-keys {
            font-weight: bold;
            color: #4a90e2;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .edit-history-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            max-width: 90%;
            width: 300px;
        }

        .edit-history-modal input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .edit-history-modal button {
            padding: 6px 12px;
            margin-right: 5px;
        }

        .mobile-quick-search-container {
            width: 100%;
            margin-bottom: 5px;
            display: none;
        }

        .mobile-quick-search-wrapper {
            display: none;
            right: 120px;
            /* 调整到历史标题右侧 */
            top: 10px;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
            width: auto;
            /* 改为自动宽度 */
            float: left;
            /* 左浮动 */
        }

        #mobile-quick-search {
            width: 100px;
            /* 缩小宽度 */
            padding: 4px 8px;
            /* 减小内边距 */
            height: 8px;
            /* 固定高度 */
            font-size: 14px;
            border: 1px solid #000;
            /* caret-color: transparent; 隐藏光标 */

        }

        #mobile-esc-btn {
            padding: 4px 8px;
            height: 28px;
            /* 与输入框同高 */
            line-height: 1;
        }

        @media (max-width: 1200px) {
            .mobile-quick-search-container {
                display: block;
            }

            #quick-search-hint {
                display: none !important;
            }
        }

        @media (min-width: 1201px) {
            .mobile-quick-search-wrapper {
                display: none;
            }

            #quick-search-hint {
                display: block !important;
            }
        }

        @media (max-width: 768px) {
            #mobile-esc-btn {
                display: inline-block;
                padding: 6px 10px;
                border: 1px solid #000;
                background: #f0f0f0;
                cursor: pointer;
            }

            .desktop-only {
                display: none !important;
            }

            .mobile-only {
                display: block !important;
            }

            .mobile-quick-search-container {
                display: block;
            }

            .mobile-quick-search-wrapper {
                display: flex;
                align-items: center;
                gap: 5px;
            }

            #quick-search-hint {
                display: none !important;
            }

            .fixed-header {
                padding: 5px 10px;
            }

            #search-input {
                padding: 4px 4px;
                font-size: 16px;
            }

            button {
                padding: 2px 1px;
                font-size: 14px;
                margin: 0px;
                width: auto;
            }

            button.small {
                font-size: 10px;
                padding: 2px 4px;
            }

            button.highlight {
                box-shadow: 0 0 0 1px #4a90e2;
            }
        }

        @media (min-width: 769px) {
            .mobile-only {
                display: none !important;
            }

        }

        #mobile-search-input {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        #quick-search-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: block;
            z-index: 100;
            cursor: pointer;
        }

        .history-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            position: sticky;
            top: -15px;
            margin-bottom: 0;
            padding: 2px 0;
            background: white;
            z-index: 10;
        }

        button {
            padding: 4px 8px;
            margin: 2px;
        }

        .quick-search-hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="fixed-header">
        <div class="search-container">
            <input type="text" id="search-input" autocomplete="off">
            <span class="clear-input" title="清空输入">×</span>
        </div>

        <div class="header-controls">
            <div class="control-buttons">
                <button id="mobile-esc-btn" class="desktop-only">ESC</button>
                <button id="save-only">仅保存</button>
                <button id="all-sites">所有</button>
                <button id="common-sites">常用</button>
                <button id="foreign-sites">外网</button>
                <button id="edit-history">编辑历史</button>
                <button id="export-history">导出历史</button>
                <button id="import-history">导入历史</button>
            </div>
        </div>
        <div class="btn-group">
            <button data-site="xiaohongshu">小红书</button>
            <button data-site="douyin">抖音</button>
            <button data-site="douyin-history" class="small">抖音历史</button>
            <button data-site="douyin-fav" class="small">抖音收藏夹</button>
            <button data-site="zhihu">知乎</button>
            <button data-site="zhihu-history" class="small">知乎历史</button>
            <button data-site="zhihu-fav" class="small">知乎收藏</button>
            <button data-site="bilibili">哔哩哔哩</button>
            <button data-site="bilibili-history" class="small">哔哩哔哩历史</button>
            <button data-site="bilibili-fav" class="small">哔哩哔哩收藏夹</button>
            <button data-site="bing">必应</button>
            <button data-site="baidu">百度</button>
            <button data-site="tieba">百度贴吧</button>
            <button data-site="qq-medical">腾讯医典</button>
            <button data-site="github">GitHub</button>
            <button data-site="google">谷歌</button>
            <button data-site="twitter">推特</button>
            <button data-site="yandex">Yandex</button>
            <button data-site="mubu">幕布精选社区</button>
            <button data-site="anki">Anki卡牌分享社区</button>
            <button data-site="wandoujia">豌豆荚</button>
            <button data-site="greasyfork">Greasy Fork</button>
            <button data-site="coolapk">酷安</button>
            <button data-site="tongyi">通义千问</button>
            <button data-site="kimi">Kimi</button>
            <button data-site="deepseek">DeepSeek</button>
            <button data-site="ximalaya">喜马拉雅搜索</button>
            <button data-site="pinduoduo">拼多多</button>
            <button data-site="jd">京东</button>
            <button data-site="taobao">淘宝</button>
            <button data-site="weixin">微信搜索</button>
            <button data-site="quicker">Quicker</button>
            <button data-site="lingfengyun">凌风云</button>
            <button data-site="wangpanzhijia">网盘之家</button>
        </div>

        <div class="history-container">
            <div class="history-title">搜索历史</div>
            <div class="mobile-quick-search-wrapper">
                <button id="mobile-esc-btn" class="mobile-only">×</button>
                <input type="text" id="mobile-quick-search" class="mobile-only" placeholder="快速搜索" autocomplete="off"
                    spellcheck="false">
            </div>
        </div>
    </div>

    <div class="scrollable-content">
        <div id="history-list"></div>
    </div>

    <div id="quick-search-hint">快速搜索: <span id="current-keys">[无]</span></div>

    <div class="modal" id="error-modal">
        <div class="modal-content">
            <p>请输入搜索关键词！</p>
        </div>
    </div>

    <div class="edit-history-modal" id="edit-history-modal">
        <input type="text" id="history-edit-input">
        <button id="save-edit">保存</button>
        <button id="cancel-edit">取消</button>
    </div>

    <script>
        // 网站搜索URL模板
        const siteUrls = {
            xiaohongshu: 'https://www.xiaohongshu.com/search_result?keyword=',
            douyin: 'https://www.douyin.com/search/',
            'douyin-history': 'https://www.douyin.com/user/self?from_tab_name=main&showTab=record',
            'douyin-fav': 'https://www.douyin.com/user/self?from_tab_name=main&showTab=favorite_collection',
            zhihu: 'https://www.bing.com/search?q=site:zhihu.com ',
            'zhihu-history': 'https://www.zhihu.com/search?type=content&q=',
            'zhihu-fav': 'https://www.zhihu.com/collections/mine',
            bilibili: 'https://search.bilibili.com/all?keyword=',
            'bilibili-history': 'https://www.bilibili.com/history',
            'bilibili-fav': 'https://space.bilibili.com/249112844/favlist?fid=51323344&ftype=create',
            bing: 'https://www.bing.com/search?q=',
            baidu: 'https://www.baidu.com/s?wd=',
            tieba: 'https://tieba.baidu.com/f/search/res?ie=utf-8&qw=',
            'qq-medical': 'https://h5.baike.qq.com/mobile/search.html?search=',
            github: 'https://github.com/search?q=',
            google: 'https://www.google.com/search?q=',
            twitter: 'https://twitter.com/search?q=',
            yandex: 'https://yandex.com/search/?text=',
            mubu: 'https://mubu.com/explore/community/search?query=',
            anki: 'https://ankiweb.net/shared/decks/',
            wandoujia: 'https://www.wandoujia.com/',
            greasyfork: 'https://greasyfork.org/zh-CN/scripts?q=',
            coolapk: 'https://www.coolapk.com/search?q=',
            tongyi: 'https://tongyi.aliyun.com/qianwen/',
            kimi: 'https://kimi.moonshot.cn/',
            deepseek: 'https://chat.deepseek.com/',
            ximalaya: 'https://www.ximalaya.com/so/',
            pinduoduo: 'https://yangkeduo.com/search_result.html?search_key=',
            jd: 'https://search.jd.com/Search?keyword=',
            taobao: 'https://s.taobao.com/search?q=',
            weixin: 'https://weixin.sogou.com/weixin?type=2&s_from=input&ie=utf8&query=',
            quicker: 'https://getquicker.net/Search?keyword=',
            lingfengyun: 'https://www.lingfengyun.com/Search/Search?wd=',
            wangpanzhijia: 'https://www.lingfengyun.com/?wd='
        };

        // 链接按钮列表（直接打开，不需要关键词）
        const linkButtons = [
            'douyin-history', 'douyin-fav',
            'zhihu-history', 'zhihu-fav',
            'bilibili-history', 'bilibili-fav',
            'tongyi', 'kimi', 'deepseek'
        ];

        // 常用网站列表
        const commonSites = ['xiaohongshu', 'douyin', 'zhihu', 'bilibili', 'bing', 'baidu', 'github', 'mubu', 'anki', 'tongyi', 'kimi', 'deepseek', 'ximalaya'];

        // 外网网站列表
        const foreignSites = ['google', 'twitter', 'yandex', 'github', 'greasyfork'];

        // 所有网站列表
        const allSites = Object.keys(siteUrls);

        // 获取DOM元素
        const searchInput = document.getElementById('search-input');
        const historyList = document.getElementById('history-list');
        const saveOnlyBtn = document.getElementById('save-only');
        const allSitesBtn = document.getElementById('all-sites');
        const commonSitesBtn = document.getElementById('common-sites');
        const foreignSitesBtn = document.getElementById('foreign-sites');
        const editHistoryBtn = document.getElementById('edit-history');
        const exportHistoryBtn = document.getElementById('export-history');
        const importHistoryBtn = document.getElementById('import-history');
        const clearInputBtn = document.querySelector('.clear-input');
        const quickSearchHint = document.getElementById('quick-search-hint');
        const currentKeysDisplay = document.getElementById('current-keys');
        const editHistoryModal = document.getElementById('edit-history-modal');
        const historyEditInput = document.getElementById('history-edit-input');
        const saveEditBtn = document.getElementById('save-edit');
        const cancelEditBtn = document.getElementById('cancel-edit');
        const errorModal = document.getElementById('error-modal');
        const mobileQuickSearch = document.getElementById('mobile-quick-search');
        const mobileEscBtn = document.getElementById('mobile-esc-btn');
        let historyItems = [];
        quickSearchHint.style.display = 'block'; // 恢复显示
        // 导航相关变量
        let currentFocusElement = null;
        let selectedElements = [];
        let lastDeletedItems = [];
        let quickSearchActive = false;

        // 编辑状态标志
        let isEditMode = false;
        let isEditingHistory = false;
        let currentEditItem = null;
        let isInputMethodActive = false;

        // 快速搜索相关变量
        let quickSearchKeys = '';
        let matchedItems = [];
        let currentMatchIndex = -1;

        // 加载搜索历史
        let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
        renderHistory();

        // 初始化事件监听
        initEventListeners();

        function initEventListeners() {
            window.addEventListener('DOMContentLoaded', function () {
                if (window.innerWidth <= 768) {
                    mobileQuickSearch.focus();
                } else {
                    searchInput.focus();
                }
            });
            // 全局键盘事件（用于快速搜索）
            document.addEventListener('keydown', handleGlobalKeyDown);

            // 输入框事件
            searchInput.addEventListener('input', handleInput);
            searchInput.addEventListener('keydown', handleInputKeyDown);
            searchInput.addEventListener('focus', () => {
                currentFocusElement = searchInput;
                quickSearchActive = false;
            });

            // 清空输入框按钮
            // 修改清空按钮事件监听器
            clearInputBtn.addEventListener('click', () => {
                // 清空主搜索框
                searchInput.value = '';
                searchInput.focus();

                // 清空快速搜索状态
                quickSearchKeys = '';
                updateQuickSearchDisplay();
                clearMatches();

                // 显示所有元素
                document.querySelectorAll('.history-item, button[data-site]').forEach(el => {
                    el.style.display = 'inline-block';
                });
            });

            // 保存但不搜索按钮
            saveOnlyBtn.addEventListener('click', () => {
                const keyword = searchInput.value.trim();
                if (keyword) {
                    addToHistory(keyword);
                    searchInput.value = '';
                }
            });

            // 编辑历史按钮
            // 编辑历史按钮
            editHistoryBtn.addEventListener('click', (e) => {
                e.preventDefault(); // 新增
                e.stopPropagation();
                isEditMode = !isEditMode;
                editHistoryBtn.textContent = isEditMode ? '退出编辑' : '编辑历史';
                renderHistory();
            });

            // 导出历史按钮
            exportHistoryBtn.addEventListener('click', (e) => {
                e.preventDefault(); // 新增
                e.stopPropagation(); // 新增
                exportHistory();
            });

            // 导入历史按钮
            importHistoryBtn.addEventListener('click', (e) => {
                e.preventDefault(); // 新增
                e.stopPropagation(); // 新增
                importHistory();
            });

            // 批量搜索按钮
            allSitesBtn.addEventListener('click', () => batchSearch(allSites));
            commonSitesBtn.addEventListener('click', () => batchSearch(commonSites));
            foreignSitesBtn.addEventListener('click', () => batchSearch(foreignSites));
            // 为所有搜索按钮添加事件监听
            document.querySelectorAll('.btn-group button[data-site], .control-buttons button[data-site]').forEach(button => {
                button.addEventListener('click', (e) => {
                    const site = button.getAttribute('data-site');
                    if (e.button === 0) { // 左键点击
                        if (selectedElements.length > 0 && selectedElements.includes(button)) {
                            toggleSelectElement(button);
                        } else {
                            search(site, true);
                        }
                    }
                });

                // 右键点击多选
                button.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    toggleSelectElement(button);
                });

                button.addEventListener('focus', () => {
                    if (!quickSearchActive) {
                        currentFocusElement = button;
                        quickSearchKeys = '';
                        updateQuickSearchDisplay();
                        clearMatches();
                    }
                });
            });

            // 单独处理编辑历史和导出历史按钮
            // 单独处理编辑历史和导出历史按钮

            // 保存编辑的历史记录
            saveEditBtn.addEventListener('click', () => {
                if (currentEditItem && historyEditInput.value.trim()) {
                    const oldKeyword = currentEditItem.getAttribute('data-keyword');
                    const newKeyword = historyEditInput.value.trim();
                    if (oldKeyword !== newKeyword) {
                        removeFromHistory(oldKeyword);
                        addToHistory(newKeyword);
                    }
                    editHistoryModal.style.display = 'none';
                    isEditingHistory = false;
                    currentEditItem = null;
                }
            });

            // 取消编辑历史记录
            cancelEditBtn.addEventListener('click', () => {
                editHistoryModal.style.display = 'none';
                isEditingHistory = false;
                currentEditItem = null;
            });
            document.addEventListener('click', (e) => {
                // 处理编辑模式
                if (isEditMode && !e.target.closest('.history-item') && e.target !== editHistoryBtn) {
                    isEditMode = false;
                    editHistoryBtn.textContent = '编辑历史';
                    renderHistory();
                }

                // 关闭编辑模态框
                if (isEditingHistory && !e.target.closest('#edit-history-modal') && e.target !== editHistoryBtn) {
                    editHistoryModal.style.display = 'none';
                    isEditingHistory = false;
                    currentEditItem = null;
                }

                // 点击空白处处理
                if (!e.target.closest('button, input, .history-item, #quick-search-hint')) {
                    if (document.activeElement === searchInput) {
                        searchInput.blur();
                    }
                    if (quickSearchActive) {
                        quickSearchKeys = '';
                        updateQuickSearchDisplay();
                        clearMatches();
                        quickSearchActive = false;
                        showAllHistoryItems();
                    }
                }
                // 移动端快速搜索处理
                // 移动端快速搜索处理


                // ESC按钮处理
                document.getElementById('mobile-esc-btn').addEventListener('click', function (e) {
                    e.stopPropagation();

                    // 第一段：清空搜索框
                    if (mobileQuickSearch.value) {
                        mobileQuickSearch.value = '';
                        quickSearchKeys = '';
                        updateQuickSearchDisplay();
                        clearMatches();
                        showAllHistoryItems();
                        return;
                    }

                    // 第二段：取消匹配状态
                    if (document.querySelector('.highlight')) {
                        clearMatches();
                        showAllHistoryItems();
                        return;
                    }

                    // 第三段：关闭输入法

        // 改进的方向键导航
        function navigateWithArrowKeys(key) {
            const allElements = Array.from(document.querySelectorAll('button, .history-item, input'));
            const currentIndex = allElements.indexOf(currentFocusElement);

            if (currentIndex === -1) {
                const firstFocusable = document.querySelector('button, .history-item, input');
                if (firstFocusable) {
                    firstFocusable.focus();
                    currentFocusElement = firstFocusable;
                }
                return;
            }

            const currentRect = currentFocusElement.getBoundingClientRect();
            let bestCandidate = null;
            let minDistance = Infinity;

            allElements.forEach((el, index) => {
                if (index === currentIndex) return;

                const rect = el.getBoundingClientRect();
                let isCandidate = false;
                let distance = 0;

                if (key === 'ArrowDown') {
                    isCandidate = rect.top > currentRect.bottom - 5;
                    distance = Math.sqrt(
                        Math.pow(rect.left - currentRect.left, 2) +
                        Math.pow(rect.top - currentRect.bottom, 2)
                    );
                } else if (key === 'ArrowUp') {
                    isCandidate = rect.bottom < currentRect.top + 5;
                    distance = Math.sqrt(
                        Math.pow(rect.left - currentRect.left, 2) +
                        Math.pow(currentRect.top - rect.bottom, 2)
                    );
                } else if (key === 'ArrowLeft') {
                    isCandidate = index < currentIndex;
                    distance = currentIndex - index;
                } else if (key === 'ArrowRight') {
                    isCandidate = index > currentIndex;
                    distance = index - currentIndex;
                }

                if (isCandidate && distance < minDistance) {
                    minDistance = distance;
                    bestCandidate = el;
                }
            });

            if (bestCandidate) {
                bestCandidate.focus();
                currentFocusElement = bestCandidate;
                bestCandidate.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        // 使用拼音库获取拼音首字母

                item.textContent = keyword;
                item.setAttribute('data-keyword', keyword);
                item.tabIndex = 0;
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (isEditMode) {
                        // 编辑模式下点击直接删除
                        removeFromHistory(keyword);
                    } else {
                        if (e.button === 0) {
                            searchInput.value = keyword;
                            searchInput.focus();
                        } else if (e.button === 2) {
                            toggleSelectElement(item);
                        }
                    }
                });

                item.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    const rect = e.target.getBoundingClientRect();
                    const clickPosition = e.clientX - rect.left; // 计算点击位置
                    editHistoryItem(keyword, clickPosition); // 传递位置参数
                });

                item.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    toggleSelectElement(item);
                });

                item.addEventListener('focus', () => {
                    if (!quickSearchActive) {
                        currentFocusElement = item;
                    }
                });

                historyList.appendChild(item);
                historyItems.push(item);
            });
        }

        // 从历史记录中移除
        function removeFromHistory(keyword) {
            searchHistory = searchHistory.filter(item => item !== keyword);
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            renderHistory();
        }

        // 添加到搜索历史
        function addToHistory(keyword) {
            if (!searchHistory.includes(keyword)) {
                searchHistory.unshift(keyword);
                localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                renderHistory();
            }
        }

        // 搜索功能
        function search(site, immediate = false) {
            const keyword = searchInput.value.trim();

            if (linkButtons.includes(site)) {
                if (keyword) {
                    navigator.clipboard.writeText(keyword).catch(err => {
                        console.error('无法复制到剪贴板:', err);
                    });
                    addToHistory(keyword);
                }
                const url = siteUrls[site];
                window.open(url, '_blank');
                return;
            }

            if (keyword) {
                addToHistory(keyword);
                const url = siteUrls[site] + encodeURIComponent(keyword);
                window.open(url, '_blank');
            }
        }

        // 批量搜索函数
        // 找到原batchSearch函数（约在1580行左右）
        function batchSearch(sites) {
            const keyword = searchInput.value.trim();
            const processedSites = new Set(); // 用集合去重

            // 只执行一次搜索
            sites.forEach(site => {
                if (processedSites.has(site)) return;
                processedSites.add(site);

                if (linkButtons.includes(site)) {
                    const url = siteUrls[site];
                    window.open(url, '_blank');
                } else if (keyword) {
                    const url = siteUrls[site] + encodeURIComponent(keyword);
                    window.open(url, '_blank');
                }
            });

            if (keyword) {
                addToHistory(keyword);
            }
        }

        // 导出历史记录
        function exportHistory() {
            if (searchHistory.length === 0) return;

            const content = searchHistory.join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);

            // 改进的手机端导出处理
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                // 手机端特殊处理
                const reader = new FileReader();
                reader.onload = function (e) {
                    const modal = document.createElement('div');
                    modal.style.position = 'fixed';
                    modal.style.top = '0';
                    modal.style.left = '0';
                    modal.style.right = '0';
                    modal.style.bottom = '0';
                    modal.style.backgroundColor = 'rgba(0,0,0,0.7)';
                    modal.style.display = 'flex';
                    modal.style.justifyContent = 'center';
                    modal.style.alignItems = 'center';
                    modal.style.zIndex = '2000';

                    const box = document.createElement('div');
                    box.style.backgroundColor = 'white';
                    box.style.padding = '20px';
                    box.style.borderRadius = '5px';
                    box.innerHTML = `
                        <p>请长按下方链接选择"下载"或"保存"</p>
                        <a href="${url}" download="搜索历史.txt" style="word-break:break-all;">下载搜索历史</a>
                        <p><button style="margin-top:10px;">关闭</button></p>
                    `;

                    box.querySelector('button').addEventListener('click', () => {
                        document.body.removeChild(modal);
                        URL.revokeObjectURL(url);
                    });

                    modal.appendChild(box);
                    document.body.appendChild(modal);
                };
                reader.readAsDataURL(blob);
            } else {
                // PC端正常下载
                const a = document.createElement('a');
                a.href = url;
                a.download = '搜索历史.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }
        }

        // 导入历史记录
        function importHistory() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const content = e.target.result;
                        const lines = content.split('\n').filter(line => line.trim());
                        searchHistory = lines.concat(searchHistory);
                        localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                        renderHistory();
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // 编辑历史记录项
        function editHistoryItem(keyword, clickPosition) {
            isEditingHistory = true;
            currentEditItem = document.querySelector(`.history-item[data-keyword="${keyword}"]`);
            if (currentEditItem) {
                historyEditInput.value = keyword;
                editHistoryModal.style.display = 'block';

                // 设置光标位置（使用点击位置计算）
                setTimeout(() => {
                    historyEditInput.focus();
                    // 使用精确计算方法
                    const text = historyEditInput.value;
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    context.font = window.getComputedStyle(historyEditInput).font;
                    let position = 0;

                    for (let i = 0; i <= text.length; i++) {
                        const width = context.measureText(text.substring(0, i)).width;
                        if (width > clickPosition) {
                            position = i - 1;
                            break;
                        }
                        if (i === text.length) {
                            position = i;
                        }
                    }

                    historyEditInput.setSelectionRange(position, position);
                }, 50);
            }
        }

        // 输入框输入事件处理
        function handleInput() {
            if (!isEditMode) {
                const keyword = searchInput.value.trim();
                if (keyword) {
                    const matchedHistory = searchHistory.filter(item => item.includes(keyword));
                    if (matchedHistory.length > 0) {
                        console.log('Matched history:', matchedHistory);
                    }
                }
            }
        }
        // 显示所有历史项
        function clearSelection() {
            selectedElements.forEach(el => {
                el.classList.remove('selected');
                if (el === currentFocusElement) {
                    el.focus(); // 保持当前焦点
                }
            });
            selectedElements = [];
        }
        function showAllHistoryItems() {
            document.querySelectorAll('.history-item').forEach(item => {
                item.style.display = 'inline-block';
            });
        }
        function toggleSelectElement(element) {
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedElements.push(element);
            } else {
                element.classList.add('selected');
                selectedElements = selectedElements.filter(el => el !== element);
            }
        }
    </script>
</body>

</html>
