<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能搜索页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .search-container {
            display: flex;
            margin-bottom: 5px;
            align-items: center;
            gap: 5px;
            width: 80%;
            max-width: 800px;
            position: relative;
        }
        #search-input {
            padding: 10px 35px 10px 10px;
            font-size: 16px;
            flex-grow: 1;
            border: 1px solid #000;
            width: 100%;
        }
        .clear-input {
            position: absolute;
            right: 3px;
            cursor: pointer;
            font-size: 24px;
            color: #999;
            padding: 8px;
            margin: -8px;
            line-height: 0.7;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 5px;
            width: 80%;
            max-width: 800px;
        }
        button {
            padding: 6px 10px;
            border: 1px solid #000;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
        }
        button:hover, button.highlight {
            background-color: #f0f0f0;
            box-shadow: 0 0 0 2px #4a90e2;
        }
        .history-container {
            margin-top: 5px;
            width: 80%;
            max-width: 800px;
        }
        .history-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .history-item {
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 8px;
            padding: 4px 8px;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 14px;
        }
        .history-item.highlight {
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px #4a90e2;
        }
        .history-item.editable {
            border: 1px dashed #000;
            background-color: #fff9f9;
        }
        .control-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
            flex-wrap: wrap;
            width: 80%;
            max-width: 800px;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" id="search-input" autocomplete="off">
        <span class="clear-input" title="清空输入">×</span>
    </div>

    <div class="control-buttons">
        <button id="save-only">仅保存</button>
        <button id="all-sites">所有</button>
        <button id="common-sites">常用</button>
        <button id="foreign-sites">外网</button>
        <button id="clear-history">清除历史</button>
        <button id="edit-history">编辑历史</button>
        <button id="export-history">导出历史</button>
    </div>

    <div class="btn-group">
        <button data-site="xiaohongshu">小红书</button>
        <button data-site="douyin">抖音</button>
        <button data-site="zhihu">知乎</button>
        <button data-site="bilibili">哔哩哔哩</button>
        <button data-site="bing">必应</button>
        <button data-site="github">GitHub</button>
        <button data-site="google">谷歌</button>
        <button data-site="twitter">推特</button>
        <button data-site="yandex">Yandex</button>
        <button data-site="mubu">幕布精选社区</button>
        <button data-site="anki">Anki卡牌分享社区</button>
        <button data-site="wandoujia">豌豆荚</button>
        <button data-site="greasyfork">Greasy Fork</button>
        <button data-site="coolapk">酷安</button>
        <button data-site="tongyi">通义千问</button>
        <button data-site="kimi">Kimi</button>
        <button data-site="ximalaya">喜马拉雅搜索</button>
    </div>

    <div class="history-container">
        <div class="history-title">搜索历史</div>
        <div id="history-list"></div>
    </div>

    <script>
        // 网站搜索URL模板
        const siteUrls = {
            xiaohongshu: 'https://www.xiaohongshu.com/search_result?keyword=',
            douyin: 'https://www.douyin.com/search/',
            zhihu: 'https://www.zhihu.com/search?q=',
            bilibili: 'https://search.bilibili.com/all?keyword=',
            bing: 'https://www.bing.com/search?q=',
            github: 'https://github.com/search?q=',
            google: 'https://www.google.com/search?q=',
            twitter: 'https://twitter.com/search?q=',
            yandex: 'https://yandex.com/search/?text=',
            mubu: 'https://mubu.com/search?keyword=',
            anki: 'https://ankiweb.net/shared/decks/',
            wandoujia: 'https://www.wandoujia.com/search?key=',
            greasyfork: 'https://greasyfork.org/zh-CN/scripts?q=',
            coolapk: 'https://www.coolapk.com/search?q=',
            tongyi: 'https://tongyi.aliyun.com/qianwen/?search=',
            kimi: 'https://kimi.moonshot.cn/?q=',
            ximalaya: 'https://www.ximalaya.com/search/'
        };

        // 常用网站列表
        const commonSites = ['xiaohongshu', 'douyin', 'zhihu', 'bilibili', 'bing', 'github', 'mubu', 'anki', 'tongyi', 'kimi', 'ximalaya'];
        
        // 外网网站列表
        const foreignSites = ['google', 'twitter', 'yandex', 'github', 'greasyfork'];

        // 所有网站列表
        const allSites = Object.keys(siteUrls);

        // 获取DOM元素
        const searchInput = document.getElementById('search-input');
        const historyList = document.getElementById('history-list');
        const saveOnlyBtn = document.getElementById('save-only');
        const clearHistoryBtn = document.getElementById('clear-history');
        const editHistoryBtn = document.getElementById('edit-history');
        const exportHistoryBtn = document.getElementById('export-history');
        const allSitesBtn = document.getElementById('all-sites');
        const commonSitesBtn = document.getElementById('common-sites');
        const foreignSitesBtn = document.getElementById('foreign-sites');
        const clearInputBtn = document.querySelector('.clear-input');
        const allButtons = document.querySelectorAll('.btn-group button, .control-buttons button');
        let historyItems = [];

        // 编辑状态标志
        let isEditMode = false;
        // 匹配项和当前选中索引
        let matchedItems = [];
        let currentMatchIndex = -1;

        // 加载搜索历史
        let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
        renderHistory();

        // 初始化事件监听
        initEventListeners();

        function initEventListeners() {
            // 输入框事件
            searchInput.addEventListener('input', handleInput);
            searchInput.addEventListener('keydown', handleKeyDown);
            
            // 清空输入框按钮
            clearInputBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchInput.focus();
                clearMatches();
            });

            // 保存但不搜索按钮
            saveOnlyBtn.addEventListener('click', () => {
                const keyword = searchInput.value.trim();
                if (keyword) {
                    addToHistory(keyword);
                    searchInput.value = '';
                    clearMatches();
                }
            });

            // 清除历史按钮
            clearHistoryBtn.addEventListener('click', () => {
                searchHistory = [];
                localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                renderHistory();
            });

            // 编辑历史按钮
            editHistoryBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                isEditMode = !isEditMode;
                editHistoryBtn.textContent = isEditMode ? '退出编辑' : '编辑历史';
                renderHistory();
            });

            // 导出历史按钮
            exportHistoryBtn.addEventListener('click', () => {
                exportHistory();
            });

            // 批量搜索按钮
            allSitesBtn.addEventListener('click', () => batchSearch(allSites));
            commonSitesBtn.addEventListener('click', () => batchSearch(commonSites));
            foreignSitesBtn.addEventListener('click', () => batchSearch(foreignSites));

            // 点击空白处退出编辑模式
            document.addEventListener('click', (e) => {
                if (isEditMode && !e.target.closest('.history-item') && e.target !== editHistoryBtn) {
                    isEditMode = false;
                    editHistoryBtn.textContent = '编辑历史';
                    renderHistory();
                }
            });

            // 为所有搜索按钮添加事件监听
            document.querySelectorAll('.btn-group button').forEach(button => {
                button.addEventListener('click', () => {
                    const site = button.getAttribute('data-site');
                    search(site);
                });
            });
        }

        // 输入处理
        function handleInput() {
            const input = searchInput.value.trim();
            if (!input) {
                clearMatches();
                return;
            }
            
            // 匹配按钮和历史记录
            matchItems(input);
        }

        // 键盘事件处理
        function handleKeyDown(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                activateCurrentMatch();
            } else if (e.key === 'Tab') {
                e.preventDefault();
                cycleMatches(e.shiftKey ? -1 : 1);
            }
        }

        // 匹配项目
        function matchItems(input) {
            matchedItems = [];
            currentMatchIndex = -1;
            
            // 匹配按钮
            allButtons.forEach(button => {
                if (fuzzyMatch(input, button.textContent)) {
                    matchedItems.push({
                        element: button,
                        type: 'button'
                    });
                    button.classList.add('highlight');
                } else {
                    button.classList.remove('highlight');
                }
            });
            
            // 匹配历史记录
            historyItems.forEach(item => {
                if (fuzzyMatch(input, item.textContent)) {
                    matchedItems.push({
                        element: item,
                        type: 'history'
                    });
                    item.classList.add('highlight');
                } else {
                    item.classList.remove('highlight');
                }
            });
            
            // 如果有匹配项，默认选中第一个
            if (matchedItems.length > 0) {
                currentMatchIndex = 0;
                highlightCurrentMatch();
            }
        }

        // 模糊匹配（支持不连续汉字首字母）
        function fuzzyMatch(input, target) {
            const inputLower = input.toLowerCase();
            const targetLower = target.toLowerCase();
            
            // 直接匹配
            if (targetLower.includes(inputLower)) return true;
            
            // 首字母匹配
            const initials = getInitials(target);
            if (initials.toLowerCase().includes(inputLower)) return true;
            
            // 不连续汉字首字母匹配
            const pattern = inputLower.split('').map(c => `(.*?${c})`).join('');
            const regex = new RegExp(pattern, 'i');
            return regex.test(initials);
        }

        // 获取字符串的首字母
        function getInitials(str) {
            return str.replace(/[^a-zA-Z\u4e00-\u9fa5]/g, '')
                     .split('')
                     .map(char => {
                         // 如果是汉字，取拼音首字母
                         if (/^[\u4e00-\u9fa5]$/.test(char)) {
                             return pinyinUtil.getFirstLetter(char);
                         }
                         return char;
                     })
                     .join('');
        }

        // 拼音工具（简化版）
        const pinyinUtil = {
            getFirstLetter: function(char) {
                // 简化的拼音首字母映射（实际项目中应使用完整拼音库）
                const map = {
                    '小':'x', '红':'h', '书':'s', '抖':'d', '音':'y', '知':'z', '乎':'h',
                    '哔':'b', '哩':'l', '必':'b', '应':'y', '谷':'g', '歌':'g', '推':'t',
                    '特':'t', '幕':'m', '布':'b', '安':'a', '卡':'k', '豌':'w', '豆':'d',
                    '荚':'j', '酷':'k', '安':'a', '通':'t', '义':'y', '千':'q', '问':'w',
                    '喜':'x', '马':'m', '拉':'l', '雅':'y'
                    // 可以继续添加更多汉字映射
                };
                return map[char] || char;
            }
        };

        // 清除所有匹配高亮
        function clearMatches() {
            matchedItems.forEach(item => {
                item.element.classList.remove('highlight');
            });
            matchedItems = [];
            currentMatchIndex = -1;
        }

        // 循环切换匹配项
        function cycleMatches(direction) {
            if (matchedItems.length === 0) return;
            
            // 移除当前高亮
            if (currentMatchIndex >= 0) {
                matchedItems[currentMatchIndex].element.classList.remove('highlight');
            }
            
            // 计算新索引
            currentMatchIndex = (currentMatchIndex + direction + matchedItems.length) % matchedItems.length;
            
            // 添加新高亮
            highlightCurrentMatch();
        }

        // 高亮当前匹配项
        function highlightCurrentMatch() {
            if (currentMatchIndex >= 0 && currentMatchIndex < matchedItems.length) {
                const currentItem = matchedItems[currentMatchIndex];
                currentItem.element.classList.add('highlight');
                currentItem.element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // 激活当前匹配项
        function activateCurrentMatch() {
            if (currentMatchIndex >= 0 && currentMatchIndex < matchedItems.length) {
                const currentItem = matchedItems[currentMatchIndex];
                if (currentItem.type === 'button') {
                    currentItem.element.click();
                } else if (currentItem.type === 'history') {
                    searchInput.value = currentItem.element.textContent;
                    searchInput.focus();
                }
            }
        }

        // 渲染搜索历史
        function renderHistory() {
            historyList.innerHTML = '';
            historyItems = [];
            
            searchHistory.forEach(keyword => {
                const item = document.createElement('div');
                item.className = 'history-item';
                if (isEditMode) {
                    item.classList.add('editable');
                }
                item.textContent = keyword;
                item.setAttribute('data-keyword', keyword);
                
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (isEditMode) {
                        removeFromHistory(keyword);
                    } else {
                        searchInput.value = keyword;
                        searchInput.focus();
                    }
                });
                
                historyList.appendChild(item);
                historyItems.push(item);
            });
        }

        // 从历史记录中移除
        function removeFromHistory(keyword) {
            searchHistory = searchHistory.filter(item => item !== keyword);
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            renderHistory();
        }

        // 添加到搜索历史
        function addToHistory(keyword) {
            if (!searchHistory.includes(keyword)) {
                searchHistory.unshift(keyword);
                localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                renderHistory();
            }
        }

        // 搜索函数
        function search(site) {
            const keyword = searchInput.value.trim();
            if (keyword) {
                addToHistory(keyword);
                const url = siteUrls[site] + encodeURIComponent(keyword);
                window.open(url, '_blank');
            }
        }

        // 批量搜索函数
        function batchSearch(sites) {
            const keyword = searchInput.value.trim();
            if (keyword) {
                addToHistory(keyword);
                
                // 分批打开标签页
                let delay = 0;
                for (let i = 0; i < sites.length; i += 2) {
                    setTimeout(() => {
                        const site1 = sites[i];
                        if (site1) {
                            const url1 = siteUrls[site1] + encodeURIComponent(keyword);
                            window.open(url1, '_blank');
                        }
                        
                        const site2 = sites[i+1];
                        if (site2) {
                            const url2 = siteUrls[site2] + encodeURIComponent(keyword);
                            window.open(url2, '_blank');
                        }
                    }, delay);
                    
                    delay += 1000;
                }
            }
        }

        // 导出历史记录
        function exportHistory() {
            if (searchHistory.length === 0) return;
            
            const content = searchHistory.join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '搜索历史.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
